<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
    <title id="title">Head-of-line en pipelining HTTP/1.1</title><desc id="desc">Las respuestas conservan el orden aunque terminen fuera de orden.</desc>
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#020617"/><stop offset=".55" stop-color="#071426"/><stop offset="1" stop-color="#11104a"/></linearGradient>
      <linearGradient id="card0" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b2442"/><stop offset="1" stop-color="#101a3a"/></linearGradient>
      <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111c44"/><stop offset="1" stop-color="#23154a"/></linearGradient>
      <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#12243d"/><stop offset="1" stop-color="#151b35"/></linearGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#67e8f9"/></marker>
      <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse"><path d="M42 0H0V42" fill="none" stroke="#1d4ed8" stroke-width="1" opacity=".12"/></pattern>
    </defs>
    <rect width="1400" height="780" rx="28" fill="url(#bg)"/><rect width="1400" height="780" rx="28" fill="url(#grid)"/>
    <circle cx="165" cy="115" r="115" fill="#0ea5e9" opacity=".08"/><circle cx="1240" cy="650" r="170" fill="#7c3aed" opacity=".09"/>
    <text x="700" y="82" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="36" font-weight="800" text-anchor="middle"><tspan x="700" dy="0">Head-of-line en pipelining HTTP/1.1</tspan></text>
    <text x="700" y="145" fill="#93c5fd" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="500" text-anchor="middle"><tspan x="700" dy="0">Las respuestas conservan el orden aunque terminen fuera de orden.</tspan></text>
    <g>
      <rect x="72" y="250" width="400" height="340" rx="24" fill="url(#card0)" stroke="#38bdf8" stroke-width="2.5"/>
      <rect x="90" y="268" width="364" height="8" rx="4" fill="#38bdf8" opacity=".9"/>
      <text x="272" y="328" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27" font-weight="750" text-anchor="middle"><tspan x="272" dy="0">Cliente</tspan></text>
      <text x="272" y="386.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" text-anchor="middle"><tspan x="272" dy="0">R1 R2 R3</tspan></text>
      <circle cx="272" cy="560" r="9" fill="#38bdf8" filter="url(#glow)"/>
      <path d="M 477 420 H 495" stroke="#67e8f9" stroke-width="5" marker-end="url(#arrow)" opacity=".8"/>
    </g><g>
      <rect x="500" y="250" width="400" height="340" rx="24" fill="url(#card1)" stroke="#818cf8" stroke-width="2.5"/>
      <rect x="518" y="268" width="364" height="8" rx="4" fill="#818cf8" opacity=".9"/>
      <text x="700" y="328" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27" font-weight="750" text-anchor="middle"><tspan x="700" dy="0">Servidor</tspan></text>
      <text x="700" y="386.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" text-anchor="middle"><tspan x="700" dy="0">R1 lenta bloquea R2 y R3</tspan></text>
      <circle cx="700" cy="560" r="9" fill="#818cf8" filter="url(#glow)"/>
      <path d="M 905 420 H 923" stroke="#67e8f9" stroke-width="5" marker-end="url(#arrow)" opacity=".8"/>
    </g><g>
      <rect x="928" y="250" width="400" height="340" rx="24" fill="url(#card2)" stroke="#c084fc" stroke-width="2.5"/>
      <rect x="946" y="268" width="364" height="8" rx="4" fill="#c084fc" opacity=".9"/>
      <text x="1128" y="328" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27" font-weight="750" text-anchor="middle"><tspan x="1128" dy="0">Resultado</tspan></text>
      <text x="1128" y="386.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" text-anchor="middle"><tspan x="1128" dy="0">Cola y latencia acumulada</tspan></text>
      <circle cx="1128" cy="560" r="9" fill="#c084fc" filter="url(#glow)"/>
      
    </g>
    <text x="70" y="722" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">FAAC · 07</text>
    <path d="M70 678 H1330" stroke="#334155" stroke-width="1"/>
  </svg>