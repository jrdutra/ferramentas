<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
    <title id="title">QUIC: loss controlled per stream</title><desc id="desc">A lost packet in one stream does not block available data in the others.</desc>
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#020617"/><stop offset=".55" stop-color="#071426"/><stop offset="1" stop-color="#11104a"/></linearGradient>
      <linearGradient id="card0" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b2442"/><stop offset="1" stop-color="#101a3a"/></linearGradient>
      <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111c44"/><stop offset="1" stop-color="#23154a"/></linearGradient>
      <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#12243d"/><stop offset="1" stop-color="#151b35"/></linearGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#67e8f9"/></marker>
      <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse"><path d="M42 0H0V42" fill="none" stroke="#1d4ed8" stroke-width="1" opacity=".12"/></pattern>
    </defs>
    <rect width="1400" height="780" rx="28" fill="url(#bg)"/><rect width="1400" height="780" rx="28" fill="url(#grid)"/>
    <circle cx="165" cy="115" r="115" fill="#0ea5e9" opacity=".08"/><circle cx="1240" cy="650" r="170" fill="#7c3aed" opacity=".09"/>
    <text x="700" y="82" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="36" font-weight="800" text-anchor="middle"><tspan x="700" dy="0">QUIC: loss controlled per stream</tspan></text>
    <text x="700" y="145" fill="#93c5fd" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="500" text-anchor="middle"><tspan x="700" dy="0">A lost packet in one stream does not block available data in the others.</tspan></text>
    <g>
      <rect x="72" y="250" width="293" height="340" rx="24" fill="url(#card0)" stroke="#38bdf8" stroke-width="2.5"/>
      <rect x="90" y="268" width="257" height="8" rx="4" fill="#38bdf8" opacity=".9"/>
      <text x="218.5" y="328" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27" font-weight="750" text-anchor="middle"><tspan x="218.5" dy="0">Stream A</tspan></text>
      <text x="218.5" y="386.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" text-anchor="middle"><tspan x="218.5" dy="0">Continuous delivery</tspan></text>
      <circle cx="218.5" cy="560" r="9" fill="#38bdf8" filter="url(#glow)"/>
      <path d="M 370 420 H 388" stroke="#67e8f9" stroke-width="5" marker-end="url(#arrow)" opacity=".8"/>
    </g><g>
      <rect x="393" y="250" width="293" height="340" rx="24" fill="url(#card1)" stroke="#818cf8" stroke-width="2.5"/>
      <rect x="411" y="268" width="257" height="8" rx="4" fill="#818cf8" opacity=".9"/>
      <text x="539.5" y="328" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27" font-weight="750" text-anchor="middle"><tspan x="539.5" dy="0">Stream B</tspan></text>
      <text x="539.5" y="386.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" text-anchor="middle"><tspan x="539.5" dy="0">Local loss and</tspan><tspan x="539.5" dy="26.25">retransmission</tspan></text>
      <circle cx="539.5" cy="560" r="9" fill="#818cf8" filter="url(#glow)"/>
      <path d="M 691 420 H 709" stroke="#67e8f9" stroke-width="5" marker-end="url(#arrow)" opacity=".8"/>
    </g><g>
      <rect x="714" y="250" width="293" height="340" rx="24" fill="url(#card2)" stroke="#c084fc" stroke-width="2.5"/>
      <rect x="732" y="268" width="257" height="8" rx="4" fill="#c084fc" opacity=".9"/>
      <text x="860.5" y="328" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27" font-weight="750" text-anchor="middle"><tspan x="860.5" dy="0">Stream C</tspan></text>
      <text x="860.5" y="386.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" text-anchor="middle"><tspan x="860.5" dy="0">Continuous delivery</tspan></text>
      <circle cx="860.5" cy="560" r="9" fill="#c084fc" filter="url(#glow)"/>
      <path d="M 1012 420 H 1030" stroke="#67e8f9" stroke-width="5" marker-end="url(#arrow)" opacity=".8"/>
    </g><g>
      <rect x="1035" y="250" width="293" height="340" rx="24" fill="url(#card0)" stroke="#22d3ee" stroke-width="2.5"/>
      <rect x="1053" y="268" width="257" height="8" rx="4" fill="#22d3ee" opacity=".9"/>
      <text x="1181.5" y="328" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27" font-weight="750" text-anchor="middle"><tspan x="1181.5" dy="0">QUIC</tspan></text>
      <text x="1181.5" y="386.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" text-anchor="middle"><tspan x="1181.5" dy="0">Per-stream control</tspan></text>
      <circle cx="1181.5" cy="560" r="9" fill="#22d3ee" filter="url(#glow)"/>
      
    </g>
    <text x="70" y="722" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">FAAC · 14</text>
    <path d="M70 678 H1330" stroke="#334155" stroke-width="1"/>
  </svg>