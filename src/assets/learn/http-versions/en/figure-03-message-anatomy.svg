    <text x="700" y="145" fill="#93c5fd" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="500" text-anchor="middle"><tspan x="700" dy="0">Requests and responses are self-descriptive messages.</tspan></text>
