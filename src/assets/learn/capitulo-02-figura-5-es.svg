<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
<title id="title">Dos ventanas limitan el envío: flujo y congestión</title><desc id="desc">Dos ventanas limitan el envío: flujo y congestión</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#111236"/></linearGradient><linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#00ffd1"/><stop offset="1" stop-color="#38a8ff"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#5de7ff"/></marker></defs>
<rect width="100%" height="100%" rx="26" fill="url(#bg)"/><g font-family="Arial, sans-serif"><text x="600" y="50" text-anchor="middle" fill="#f3f7ff" font-size="30" font-weight="700">Dos ventanas limitan el envío: flujo y congestión</text><text x="100" y="110" text-anchor="start" fill="#9cff84" font-size="18" font-weight="700">Ventana de recepción (rwnd)</text><rect x="100" y="130" width="1000" height="76" rx="15" fill="#20382c" stroke="#8cdc75" stroke-width="3"/><rect x="100" y="130" width="580" height="76" rx="15" fill="#4a9e43"/><text x="390" y="175" text-anchor="middle" fill="#efffea" font-size="16" font-weight="400">buffer disponible en el receptor</text><text x="890" y="175" text-anchor="middle" fill="#c5d6c2" font-size="16" font-weight="400">espacio aún no anunciado</text><text x="100" y="260" text-anchor="start" fill="#ffd45a" font-size="18" font-weight="700">Ventana de congestión (cwnd)</text><rect x="100" y="280" width="1000" height="76" rx="15" fill="#3b3218" stroke="#ffc438" stroke-width="3"/><rect x="100" y="280" width="430" height="76" rx="15" fill="#ffb900"/><text x="315" y="325" text-anchor="middle" fill="#1d1b15" font-size="16" font-weight="400">límite estimado de la red</text><text x="815" y="325" text-anchor="middle" fill="#e5d7aa" font-size="16" font-weight="400">capacidad que el algoritmo aún no liberó</text><rect x="300" y="405" width="600" height="72" rx="18" fill="#132f49" stroke="#38a8ff" stroke-width="3"/><text x="600" y="451" text-anchor="middle" fill="#bfeaff" font-size="22" font-weight="700">Datos en vuelo &lt;= min(rwnd, cwnd)</text><text x="600" y="545" text-anchor="middle" fill="#91a6bd" font-size="14" font-weight="400">rwnd protege al receptor; cwnd protege la red. Confundir las dos ventanas conduce a diagnósticos incorrectos.</text></g></svg>