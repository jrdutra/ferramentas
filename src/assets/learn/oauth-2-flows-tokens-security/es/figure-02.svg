<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="Authorization Code con PKCE: dos canales y una prueba vinculada"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#bc78ff"/><stop offset=".5" stop-color="#27d8ff"/><stop offset="1" stop-color="#35f2c1"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="context-stroke"/></marker></defs><rect width="1200" height="620" rx="28" fill="#070d22"/><path d="M0 95H1200M0 548H1200" stroke="#29436f" opacity=".35"/><text x="60" y="66" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="29" font-weight="700">Authorization Code con PKCE: dos canales y una prueba vinculada</text><text x="85" y="135" text-anchor="middle" fill="#27d8ff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="750">Usuario / navegador</text><path d="M85 155V480" stroke="#29436f" stroke-width="2" stroke-dasharray="6 8"/><text x="380" y="135" text-anchor="middle" fill="#ffbd59" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="750">Cliente</text><path d="M380 155V480" stroke="#29436f" stroke-width="2" stroke-dasharray="6 8"/><text x="675" y="135" text-anchor="middle" fill="#bc78ff" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="750">Authorization Server</text><path d="M675 155V480" stroke="#29436f" stroke-width="2" stroke-dasharray="6 8"/><text x="970" y="135" text-anchor="middle" fill="#35f2c1" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="750">API</text><path d="M970 155V480" stroke="#29436f" stroke-width="2" stroke-dasharray="6 8"/><path d="M380 185L675 185" fill="none" stroke="#ffbd59" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><text x="527.5" y="173" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="650">1. state + code_challenge + redirect_uri</text><path d="M85 235L675 235" fill="none" stroke="#27d8ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><text x="380" y="223" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="650">2. autenticación y consentimiento</text><path d="M675 285L380 285" fill="none" stroke="#bc78ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><text x="527.5" y="273" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="650">3. authorization code + state</text><path d="M380 345L675 345" fill="none" stroke="#ffbd59" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><text x="527.5" y="333" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="650">4. code + code_verifier</text><path d="M675 395L380 395" fill="none" stroke="#35f2c1" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><text x="527.5" y="383" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="650">5. access token / refresh token</text><path d="M380 445L970 445" fill="none" stroke="#27d8ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><text x="675" y="433" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="650">6. Authorization: Bearer access_token</text><rect x="120" y="505" width="960" height="72" rx="18" fill="#0d1732" stroke="url(#g)" stroke-width="2"/><text x="600" y="535" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600"><tspan x="600" dy="0">El code_challenge va en la autorización; el code_verifier aparece solo en el token</tspan><tspan x="600" dy="23.04">endpoint.</tspan></text></svg>