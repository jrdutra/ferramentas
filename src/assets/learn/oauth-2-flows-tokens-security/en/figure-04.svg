<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="Bearer and sender-constrained: who can reuse the token?"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#bc78ff"/><stop offset=".5" stop-color="#27d8ff"/><stop offset="1" stop-color="#35f2c1"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="context-stroke"/></marker></defs><rect width="1200" height="620" rx="28" fill="#070d22"/><path d="M0 95H1200M0 548H1200" stroke="#29436f" opacity=".35"/><text x="60" y="66" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="29" font-weight="700">Bearer and sender-constrained: who can reuse the token?</text><rect x="70" y="165" width="485" height="235" rx="18" fill="#0d1732" stroke="#ff6f91" stroke-width="2"/><text x="312" y="225" text-anchor="middle" fill="#ff6f91" font-family="Inter,Arial,sans-serif" font-size="26" font-weight="750">Bearer token</text><text x="312" y="280" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="550"><tspan x="312" dy="0">Anyone who obtains the value can</tspan><tspan x="312" dy="24.32">present it until expiration or</tspan><tspan x="312" dy="24.32">revocation.</tspan></text><rect x="645" y="165" width="485" height="235" rx="18" fill="#0d1732" stroke="#35f2c1" stroke-width="2"/><text x="887" y="225" text-anchor="middle" fill="#35f2c1" font-family="Inter,Arial,sans-serif" font-size="26" font-weight="750">Sender-constrained token</text><text x="887" y="280" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="550"><tspan x="887" dy="0">The caller also proves possession of</tspan><tspan x="887" dy="24.32">the key bound through mTLS or DPoP.</tspan></text><rect x="110" y="450" width="980" height="80" rx="18" fill="#0d1732" stroke="url(#g)" stroke-width="2"/><text x="600" y="480" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="600"><tspan x="600" dy="0">Sender constraint reduces replay, but requires binding validation and key</tspan><tspan x="600" dy="24.32">protection.</tspan></text></svg>