<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc"><title id="title">Cryptographic primitives</title><desc id="desc">Each security goal requires the correct primitive.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#020617"/><stop offset=".55" stop-color="#071827"/><stop offset="1" stop-color="#171044"/></linearGradient><linearGradient id="card0"><stop stop-color="#082f49"/><stop offset="1" stop-color="#111827"/></linearGradient><linearGradient id="card1"><stop stop-color="#172554"/><stop offset="1" stop-color="#111827"/></linearGradient><linearGradient id="card2"><stop stop-color="#2e1065"/><stop offset="1" stop-color="#111827"/></linearGradient><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#67e8f9"/></marker><pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse"><path d="M42 0H0V42" fill="none" stroke="#2563eb" opacity=".13"/></pattern></defs><rect width="1400" height="780" rx="28" fill="url(#bg)"/><rect width="1400" height="780" rx="28" fill="url(#grid)"/><circle cx="152" cy="110" r="115" fill="#06b6d4" opacity=".08"/><circle cx="1245" cy="652" r="175" fill="#8b5cf6" opacity=".09"/><text x="700" y="80" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="40" font-weight="800" text-anchor="middle"><tspan x="700" dy="0">Cryptographic primitives</tspan></text><text x="700" y="138" fill="#93c5fd" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="500" text-anchor="middle"><tspan x="700" dy="0">Each security goal requires the correct primitive.</tspan></text><g><rect x="58" y="252" width="300" height="370" rx="24" fill="url(#card0)" stroke="#22d3ee" stroke-width="2.5"/><rect x="72" y="268" width="272" height="7" rx="4" fill="#22d3ee"/><text x="208" y="322" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="25