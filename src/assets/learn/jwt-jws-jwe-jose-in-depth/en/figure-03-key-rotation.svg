<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-label="Key rotation without interruption"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#bc78ff"/><stop offset=".5" stop-color="#27d8ff"/><stop offset="1" stop-color="#35f2c1"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="context-stroke"/></marker></defs><rect width="1200" height="660" rx="28" fill="#070d22"/><path d="M0 105H1200M0 605H1200" stroke="#29436f" opacity=".35"/><text x="600" y="55" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="27" font-weight="750"><tspan x="600" dy="0">Key rotation without interruption</tspan></text><rect x="50" y="145" width="245" height="165" rx="18" fill="#0d1732" stroke="#27d8ff" stroke-width="2"/><text x="172.5" y="190" text-anchor="middle" fill="#27d8ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800"><tspan x="172.5" dy="0">T0</tspan></text><text x="172.5" y="255" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="600"><tspan x="172.5" dy="0">JWKS publishes K1</tspan></text><path d="M295 225L335 225" fill="none" stroke="#27d8ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="335" y="145" width="245" height="165" rx="18" fill="#0d1732" stroke="#35f2c1" stroke-width="2"/><text x="457.5" y="190" text-anchor="middle" fill="#35f2c1" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800"><tspan x="457.5" dy="0">T1</tspan></text><text x="457.5" y="244.29" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="600"><tspan x="457.5" dy="0">JWKS publishes K1 and</tspan><tspan x="457.5" dy="21.76">K2</tspan></text><path d="M580 225L620 225" fill="none" stroke="#35f2c1" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="620" y="145" width="245" height="165" rx="18" fill="#0d1732" stroke="#bc78ff" stroke-width="2"/><text x="742.5" y="190" text-anchor="middle" fill="#bc78ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800"><tspan x="742.5" dy="0">T2</tspan></text><text x="742.5" y="255" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="600"><tspan x="742.5" dy="0">issuer signs with K2</tspan></text><path d="M865 225L905 225" fill="none" stroke="#bc78ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="905" y="145" width="245" height="165" rx="18" fill="#0d1732" stroke="#ffbd59" stroke-width="2"/><text x="1027.5" y="190" text-anchor="middle" fill="#ffbd59" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800"><tspan x="1027.5" dy="0">T3</tspan></text><text x="1027.5" y="244.29" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="600"><tspan x="1027.5" dy="0">K1 leaves after</tspan><tspan x="1027.5" dy="21.76">expiration</tspan></text><rect x="75" y="360" width="1050" height="80" rx="18" fill="#0d1732" stroke="#35f2c1" stroke-width="2"/><text x="600" y="400" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600"><tspan x="600" dy="0">Overlap must exceed cache, propagation, maximum token lifetime, and operational tolerance.</tspan></text><rect x="75" y="475" width="1050" height="80" rx="18" fill="#0d1732" stroke="#ffbd59" stroke-width="2"/><text x="600" y="503.66" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600"><tspan x="600" dy="0">An unknown kid may trigger a controlled refresh, never an unrestricted lookup directed by the</tspan><tspan x="600" dy="23.04">token.</tspan></text></svg>