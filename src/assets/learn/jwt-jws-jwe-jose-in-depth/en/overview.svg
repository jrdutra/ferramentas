<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-label="Cryptographic token lifecycle in an API architecture"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#bc78ff"/><stop offset=".5" stop-color="#27d8ff"/><stop offset="1" stop-color="#35f2c1"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="context-stroke"/></marker></defs><rect width="1200" height="660" rx="28" fill="#070d22"/><path d="M0 105H1200M0 605H1200" stroke="#29436f" opacity=".35"/><text x="600" y="55" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="27" font-weight="750"><tspan x="600" dy="0">Cryptographic token lifecycle in an API architecture</tspan></text><rect x="45" y="145" width="245" height="160" rx="18" fill="#0d1732" stroke="#27d8ff" stroke-width="2"/><text x="167.5" y="195" text-anchor="middle" fill="#27d8ff" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="750"><tspan x="167.5" dy="0">Issuer</tspan></text><text x="167.5" y="255" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="550"><tspan x="167.5" dy="0">claims and private key</tspan></text><path d="M290 225L330 225" fill="none" stroke="#27d8ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="330" y="145" width="245" height="160" rx="18" fill="#0d1732" stroke="#bc78ff" stroke-width="2"/><text x="452.5" y="195" text-anchor="middle" fill="#bc78ff" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="750"><tspan x="452.5" dy="0">JWS / JWT</tspan></text><text x="452.5" y="244.92" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="550"><tspan x="452.5" dy="0">header, payload, and</tspan><tspan x="452.5" dy="20.48">signature</tspan></text><path d="M575 225L615 225" fill="none" stroke="#bc78ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="615" y="145" width="245" height="160" rx="18" fill="#0d1732" stroke="#ffbd59" stroke-width="2"/><text x="737.5" y="195" text-anchor="middle" fill="#ffbd59" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="750"><tspan x="737.5" dy="0">API Gateway</tspan></text><text x="737.5" y="255" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="550"><tspan x="737.5" dy="0">validation and policy</tspan></text><path d="M860 225L900 225" fill="none" stroke="#ffbd59" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="900" y="145" width="245" height="160" rx="18" fill="#0d1732" stroke="#35f2c1" stroke-width="2"/><text x="1022.5" y="195" text-anchor="middle" fill="#35f2c1" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="750"><tspan x="1022.5" dy="0">Backend</tspan></text><text x="1022.5" y="255" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="550"><tspan x="1022.5" dy="0">domain authorization</tspan></text><rect x="110" y="350" width="980" height="70" rx="18" fill="#0d1732" stroke="#ffbd59" stroke-width="2"/><text x="600" y="385" text-anchor="middle" fill="#ffbd59" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700"><tspan x="600" dy="0">JWE when content confidentiality is a genuine requirement</tspan></text><rect x="75" y="465" width="1050" height="100" rx="18" fill="#0d1732" stroke="url(#g)" stroke-width="2"/><text x="600" y="503.66" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600"><tspan x="600" dy="0">A signature protects integrity and origin; encryption protects readability. Neither replaces</tspan><tspan x="600" dy="23.04">issuer, audience, and 