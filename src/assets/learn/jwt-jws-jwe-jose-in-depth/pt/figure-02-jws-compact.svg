<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-label="JWS Compact Serialization: três partes e um signing input"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#bc78ff"/><stop offset=".5" stop-color="#27d8ff"/><stop offset="1" stop-color="#35f2c1"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="context-stroke"/></marker></defs><rect width="1200" height="660" rx="28" fill="#070d22"/><path d="M0 105H1200M0 605H1200" stroke="#29436f" opacity=".35"/><text x="600" y="55" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="27" font-weight="750"><tspan x="600" dy="0">JWS Compact Serialization: três partes e um signing input</tspan></text><rect x="70" y="145" width="310" height="180" rx="18" fill="#0d1732" stroke="#27d8ff" stroke-width="2"/><text x="225" y="205" text-anchor="middle" fill="#27d8ff" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="750"><tspan x="225" dy="0">Protected header</tspan></text><text x="225" y="270" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600"><tspan x="225" dy="0">alg, kid, typ</tspan></text><text x="412" y="245" text-anchor="middle" fill="#eff7ff" font-size="34" font-weight="800">.</text><rect x="445" y="145" width="310" height="180" rx="18" fill="#0d1732" stroke="#bc78ff" stroke-width="2"/><text x="600" y="205" text-anchor="middle" fill="#bc78ff" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="750"><tspan x="600" dy="0">Payload</tspan></text><text x="600" y="270" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600"><tspan x="600" dy="0">claims ou bytes</tspan></text><text x="787" y="245" text-anchor="middle" fill="#eff7ff" font-size="34" font-weight="800">.</text><rect x="820" y="145" width="310" height="180" rx="18" fill="#0d1732" stroke="#ffbd59" stroke-width="2"/><text x="975" y="205" text-anchor="middle" fill="#ffbd59" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="750"><tspan x="975" dy="0">Signature</tspan></text><text x="975" y="270" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600"><tspan x="975" dy="0">resultado criptográfico</tspan></text><rect x="75" y="365" width="1050" height="62" rx="18" fill="#0d1732" stroke="#27d8ff" stroke-width="2"/><text x="600" y="396" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="650"><tspan x="600" dy="0">signing input = BASE64URL(UTF8(protected header)) + &quot;.&quot; + BASE64URL(payload)</tspan></text><rect x="100" y="465" width="1000" height="92" rx="18" fill="#0d1732" stroke="url(#g)" stroke-width="2"/><text x="600" y="499.66" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600"><tspan x="600" dy="0">A verificação reconstrói exatamente os bytes assinados; decodificar e serializar novamente</tspan><tspan x="600" dy="23.04">pode alterar o resultado.</tspan></text></svg>