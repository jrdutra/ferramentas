<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-label="Mecanismos de logout en OpenID Connect"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#bc78ff"/><stop offset=".5" stop-color="#27d8ff"/><stop offset="1" stop-color="#35f2c1"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="context-stroke"/></marker></defs><rect width="1200" height="660" rx="28" fill="#070d22"/><path d="M0 105H1200M0 605H1200" stroke="#29436f" opacity=".35"/><text x="600" y="48" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="27" font-weight="750"><tspan x="600" dy="0">Mecanismos de logout en OpenID Connect</tspan></text><rect x="40" y="155" width="250" height="210" rx="18" fill="#0d1732" stroke="#27d8ff" stroke-width="2"/><text x="165" y="220" text-anchor="middle" fill="#27d8ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750">RP-Initiated</text><text x="165" y="285" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500"><tspan x="165" dy="0">RP redirige al OP</tspan></text><rect x="330" y="155" width="250" height="210" rx="18" fill="#0d1732" stroke="#ffbd59" stroke-width="2"/><text x="455" y="220" text-anchor="middle" fill="#ffbd59" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750">Front-Channel</text><text x="455" y="285" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500"><tspan x="455" dy="0">OP usa el navegador</tspan></text><rect x="620" y="155" width="250" height="210" rx="18" fill="#0d1732" stroke="#bc78ff" stroke-width="2"/><text x="745" y="220" text-anchor="middle" fill="#bc78ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750">Back-Channel</text><text x="745" y="285" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500"><tspan x="745" dy="0">OP llama al RP</tspan></text><rect x="910" y="155" width="250" height="210" rx="18" fill="#0d1732" stroke="#35f2c1" stroke-width="2"/><text x="1035" y="220" text-anchor="middle" fill="#35f2c1" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750">Sesión local</text><text x="1035" y="285" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500"><tspan x="1035" dy="0">RP limpia cookie y</tspan><tspan x="1035" dy="21.76">estado</tspan></text><rect x="75" y="420" width="1050" height="62" rx="18" fill="#0d1732" stroke="#35f2c1" stroke-width="2"/><text x="600" y="449" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="600"><tspan x="600" dy="0">Back-channel no depende del user agent, pero exige un endpoint autenticable y tratamiento idempotente.</tspan></text><rect x="75" y="500" width="1050" height="62" rx="18" fill="#0d1732" stroke="#bc78ff" stroke-width="2"/><text x="600" y="529" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="600"><tspan x="600" dy="0">Front-channel depende del navegador, cookies, red y finalización de las navegaciones.</tspan></text></svg>