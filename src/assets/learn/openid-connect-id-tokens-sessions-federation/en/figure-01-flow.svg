hor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="650">front-channel: authorization request and code return</text><rect x="80" y="437" width="1040" height="54" rx="18" fill="#0d1732" stroke="#bc78ff" stroke-width="2"/><text x="600" y="471" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="650">back-channel: direct code exchange and token issuance</text><rect x="80" y="509" width="1040" height="62" rx="18" fill="#0d1732" stroke="#ffbd59" stroke-width="2"/><text x="600" y="540" text-anchor="middle" fill="#ffbd59" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="650"><tspan x="600" dy="0">The RP creates the session only after validating the ID Token and transaction.</tspan></text></svg>