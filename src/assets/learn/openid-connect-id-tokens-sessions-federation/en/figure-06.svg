<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-label="Federation: trust in metadata, keys, and policies"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#bc78ff"/><stop offset=".5" stop-color="#27d8ff"/><stop offset="1" stop-color="#35f2c1"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="context-stroke"/></marker></defs><rect width="1200" height="660" rx="28" fill="#070d22"/><path d="M0 105H1200M0 605H1200" stroke="#29436f" opacity=".35"/><text x="600" y="48" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="27" font-weight="750"><tspan x="600" dy="0">Federation: trust in metadata, keys, and policies</tspan></text><rect x="40" y="155" width="361.3333333333333" height="215" rx="18" fill="#0d1732" stroke="#27d8ff" stroke-width="2"/><circle cx="220.66666666666666" cy="195" r="10" fill="#27d8ff" filter="url(#glow)"/><text x="220.66666666666666" y="245" text-anchor="middle" fill="#27d8ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="750"><tspan x="220.66666666666666" dy="0">Relying Party</tspan></text><text x="220.66666666666666" y="310" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500"><tspan x="220.66666666666666" dy="0">trusts the expected issuer</tspan></text><path d="M401.3333333333333 260L419.3333333333333 260" fill="none" stroke="#27d8ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="419.3333333333333" y="155" width="361.3333333333333" height="215" rx="18" fill="#0d1732" stroke="#ffbd59" stroke-width="2"/><circle cx="600" cy="195" r="10" fill="#ffbd59" filter="url(#glow)"/><text x="600" y="245" text-anchor="middle" fill="#ffbd59" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="750"><tspan x="600" dy="0">Metadata and trust</tspan></text><text x="600" y="310" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500"><tspan x="600" dy="0">endpoints, keys, and policies</tspan></text><path d="M780.6666666666666 260L798.6666666666666 260" fill="none" stroke="#ffbd59" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="798.6666666666666" y="155" width="361.3333333333333" height="215" rx="18" fill="#0d1732" stroke="#bc78ff" stroke-width="2"/><circle cx="979.3333333333333" cy="195" r="10" fill="#bc78ff" filter="url(#glow)"/><text x="979.3333333333333" y="245" text-anchor="middle" fill="#bc78ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="750"><tspan x="979.3333333333333" dy="0">OpenID Provider</tspan></text><text x="979.3333333333333" y="310" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500"><tspan x="979.3333333333333" dy="0">authenticates and issues claims</tspan></text><rect x="95" y="430" width="1010" height="110" rx="18" fill="#0d1732" stroke="url(#g)" stroke-width="2"/><text x="600" y="470" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="600"><tspan x="600" dy="0">Trust does not come from HTTPS alone. It depends on issuer, registration, redirect URIs,</tspan><tspan x="600" dy="24.32">keys, algorithms, policies, and governance.</tspan></text></svg>