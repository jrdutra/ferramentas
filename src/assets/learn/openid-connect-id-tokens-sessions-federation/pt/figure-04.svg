<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-label="Três estados diferentes: OP, RP e API"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#bc78ff"/><stop offset=".5" stop-color="#27d8ff"/><stop offset="1" stop-color="#35f2c1"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="context-stroke"/></marker></defs><rect width="1200" height="660" rx="28" fill="#070d22"/><path d="M0 105H1200M0 605H1200" stroke="#29436f" opacity=".35"/><text x="600" y="48" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="27" font-weight="750"><tspan x="600" dy="0">Três estados diferentes: OP, RP e API</tspan></text><rect x="40" y="155" width="250" height="210" rx="18" fill="#0d1732" stroke="#27d8ff" stroke-width="2"/><text x="165" y="220" text-anchor="middle" fill="#27d8ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750">Sessão no OP</text><text x="165" y="285" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500"><tspan x="165" dy="0">cookie do provedor</tspan></text><rect x="330" y="155" width="250" height="210" rx="18" fill="#0d1732" stroke="#ffbd59" stroke-width="2"/><text x="455" y="220" text-anchor="middle" fill="#ffbd59" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750">Sessão no RP</text><text x="455" y="285" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500"><tspan x="455" dy="0">cookie da aplicação</tspan></text><rect x="620" y="155" width="250" height="210" rx="18" fill="#0d1732" stroke="#bc78ff" stroke-width="2"/><text x="745" y="220" text-anchor="middle" fill="#bc78ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750">Tokens OAuth</text><text x="745" y="285" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500"><tspan x="745" dy="0">access / refresh</tspan></text><rect x="910" y="155" width="250" height="210" rx="18" fill="#0d1732" stroke="#35f2c1" stroke-width="2"/><text x="1035" y="220" text-anchor="middle" fill="#35f2c1" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750">Sessão da API</text><text x="1035" y="285" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500"><tspan x="1035" dy="0">normalmente stateless</tspan></text><rect x="100" y="440" width="1000" height="100" rx="18" fill="#0d1732" stroke="url(#g)" stroke-width="2"/><text x="600" y="478" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="600"><tspan x="600" dy="0">Encerrar uma sessão não revoga automaticamente todas as outras. Logout exige política</tspan><tspan x="600" dy="24.32">explícita.</tspan></text></svg>