<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
<title id="title">TCP y UDP: servicios diferentes para la aplicación</title><desc id="desc">TCP y UDP: servicios diferentes para la aplicación</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#111236"/></linearGradient><linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#00ffd1"/><stop offset="1" stop-color="#38a8ff"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#5de7ff"/></marker></defs>
<rect width="100%" height="100%" rx="26" fill="url(#bg)"/><g font-family="Arial, sans-serif"><text x="600" y="50" text-anchor="middle" fill="#f3f7ff" font-size="30" font-weight="700">TCP y UDP: servicios diferentes para la aplicación</text><rect x="90" y="100" width="470" height="390" rx="16" fill="#0b263d" stroke="#38a8ff" stroke-width="3"/><text x="325.0" y="134" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">TCP</text><rect x="640" y="100" width="470" height="390" rx="16" fill="#172d23" stroke="#8cdc75" stroke-width="3"/><text x="875.0" y="134" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">UDP</text><text x="130" y="160" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• orientado a conexión</text><text x="130" y="198" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• flujo de bytes</text><text x="130" y="236" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• ordenación</text><text x="130" y="274" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• retransmisión</text><text x="130" y="312" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• control de flujo</text><text x="130" y="350" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• control de congestión</text><text x="130" y="388" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• handshake y estado</text><text x="130" y="426" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• HTTP/1.1 y HTTP/2</text><text x="680" y="160" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• sin conexión en el protocolo</text><text x="680" y="198" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• datagramas preservados</text><text x="680" y="236" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• sin garantía de entrega</text><text x="680" y="274" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• sin ordenación nativa</text><text x="680" y="312" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• header pequeño</text><text x="680" y="350" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• baja sobrecarga</text><text x="680" y="388" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• la aplicación añade garantías</text><text x="680" y="426" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• DNS y QUIC/HTTP/3</text><text x="600" y="555" text-anchor="middle" fill="#91a6bd" font-size="13" font-weight="400">No existe un protocolo universalmente “mejor”. La elección depende de la semántica, tolerancia a pérdidas, latencia, volumen y garantías implementadas por la aplicación.</text></g></svg>