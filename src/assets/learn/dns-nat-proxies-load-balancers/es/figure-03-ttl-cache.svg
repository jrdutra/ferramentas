<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" role="img" aria-label="TTL, caché positivo y caché negativo"><defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#071a34"/><stop offset="1" stop-color="#030817"/></linearGradient><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12z" fill="#65e8ff"/></marker><style>text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e5f4ff}.title{font-size:34px;font-weight:800}.cardTitle{font-size:23px;font-weight:800}.label{font-size:22px;font-weight:750}.small{font-size:17px;font-weight:600;fill:#b7d0e3}.card{fill:#081b35;stroke-width:2}.c0{stroke:#00d8ff}.c1{stroke:#9b6cff}.c2{stroke:#00ffd1}.c3{stroke:#ffb84d}.c4{stroke:#ff5cab}.arrow{fill:none;stroke:#65e8ff;stroke-width:4}.track{fill:none;stroke:#376e9d;stroke-width:4}</style></defs><rect width="1400" height="780" rx="30" fill="url(#bg)"/><text x="55" y="62" class="title" text-anchor="start">TTL, caché positivo y caché negativo</text><path d="M130 300H1270" class="track"/><circle cx="150" cy="300" r="14" fill="#00ffd1"/><text x="150" y="235" class="cardTitle" text-anchor="middle"><tspan x="150" dy="0">t=0</tspan></text><text x="150" y="350" class="small" text-anchor="middle"><tspan x="150" dy="0">Respuesta A</tspan><tspan x="150" dy="25">TTL 300</tspan></text><circle cx="515" cy="300" r="14" fill="#00ffd1"/><text x="515" y="235" class="cardTitle" text-anchor="middle"><tspan x="515" dy="0">t=120</tspan></text><text x="515" y="350" class="small" text-anchor="middle"><tspan x="515" dy="0">Caché válido</tspan><tspan x="515" dy="25">TTL 180</tspan></text><circle cx="880" cy="300" r="14" fill="#00ffd1"/><text x="880" y="235" class="cardTitle" text-anchor="middle"><tspan x="880" dy="0">t=300</tspan></text><text x="880" y="350" class="small" text-anchor="middle"><tspan x="880" dy="0">La entrada caduca</tspan></text><circle cx="1245" cy="300" r="14" fill="#00ffd1"/><text x="1245" y="235" class="cardTitle" text-anchor="middle"><tspan x="1245" dy="0">t=301</tspan></text><text x="1245" y="350" class="small" text-anchor="middle"><tspan x="1245" dy="0">Nueva resolución</tspan></text><g><rect x="190" y="510" width="450" height="125" rx="20" class="card c0"/><text x="415" y="552" class="cardTitle" text-anchor="middle"><tspan x="415" dy="0">Cache positivo</tspan></text><text x="415" y="588" class="small" text-anchor="middle"><tspan x="415" dy="0">RRsets válidos até o TTL</tspan></text></g><g><rect x="760" y="510" width="450" height="125" rx="20" class="card c3"/><text x="985" y="552" class="cardTitle" text-anchor="middle"><tspan x="985" dy="0">Cache negativo</tspan></text><text x="985" y="588" class="small" text-anchor="middle"><tspan x="985" dy="0">NXDOMAIN ou ausência de tipo</tspan></text></g></svg>