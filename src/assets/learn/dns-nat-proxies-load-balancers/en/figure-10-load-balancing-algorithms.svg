<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" role="img" aria-label="Backend selection algorithms"><defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#071a34"/><stop offset="1" stop-color="#030817"/></linearGradient><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12z" fill="#65e8ff"/></marker><style>text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e5f4ff}.title{font-size:34px;font-weight:800}.cardTitle{font-size:23px;font-weight:800}.label{font-size:22px;font-weight:750}.small{font-size:17px;font-weight:600;fill:#b7d0e3}.card{fill:#081b35;stroke-width:2}.c0{stroke:#00d8ff}.c1{stroke:#9b6cff}.c2{stroke:#00ffd1}.c3{stroke:#ffb84d}.c4{stroke:#ff5cab}.arrow{fill:none;stroke:#65e8ff;stroke-width:4}.track{fill:none;stroke:#376e9d;stroke-width:4}</style></defs><rect width="1400" height="780" rx="30" fill="url(#bg)"/><text x="55" y="62" class="title" text-anchor="start">Backend selection algorithms</text><g><rect x="90" y="110" width="1220" height="92" rx="20" class="card c0"/><text x="700" y="152" class="cardTitle" text-anchor="middle"><tspan x="700" dy="0">Round robin</tspan></text><text x="700" y="188" class="small" text-anchor="middle"><tspan x="700" dy="0">Sequential selection</tspan><tspan x="700" dy="25">Equivalent instances</tspan></text></g><g><rect x="90" y="228" width="1220" height="92" rx="20" class="card c1"/><text x="700" y="270" class="cardTitle" text-anchor="middle"><tspan x="700" dy="0">Weighted RR</tspan></text><text x="700" y="306" class="small" text-anchor="middle"><tspan x="700" dy="0">Weight-based share</tspan><tspan x="700" dy="25">Different capacities</tspan></text></g><g><rect x="90" y="346" width="1220" height="92" rx="20" class="card c2"/><text x="700" y="388" class="cardTitle" text-anchor="middle"><tspan x="700" dy="0">Least connections</tspan></text><text x="700" y="424" class="small" text-anchor="middle"><tspan x="700" dy="0">Fewest active connections</tspan><tspan x="700" dy="25">Variable sessions</tspan></text></g><g><rect x="90" y="464" width="1220" height="92" rx="20" class="card c3"/><text x="700" y="506" class="cardTitle" text-anchor="middle"><tspan x="700" dy="0">Least response time</tspan></text><text x="700" y="542" class="small" text-anchor="middle"><tspan x="700" dy="0">Latency and activity</tspan><tspan x="700" dy="25">Variable performance</tspan></text></g><g><rect x="90" y="582" width="1220" height="92" rx="20" class="card c4"/><text x="700" y="624" class="cardTitle" text-anchor="middle"><tspan x="700" dy="0">Hash / affinity</tspan></text><text x="700" y="660" class="small" text-anchor="middle"><tspan x="700" dy="0">A key selects the server</tspan><tspan x="700" dy="25">Session or local cache</tspan></text></g><g><rect x="90" y="700" width="1220" height="92" rx="20" class="card c0"/><text x="700" y="742" class="cardTitle" text-anchor="middle"><tspan x="700" dy="0">Consistent hash</tspan></text><text x="700" y="778" class="small" text-anchor="middle"><tspan x="700" dy="0">Reduces remapping</tspan><tspan x="700" dy="25">Less churn</tspan></text></g></svg>