<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" role="img" aria-label="HTTP intermediaries"><defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#071a34"/><stop offset="1" stop-color="#030817"/></linearGradient><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12z" fill="#65e8ff"/></marker><style>text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e5f4ff}.title{font-size:34px;font-weight:800}.cardTitle{font-size:23px;font-weight:800}.label{font-size:22px;font-weight:750}.small{font-size:17px;font-weight:600;fill:#b7d0e3}.card{fill:#081b35;stroke-width:2}.c0{stroke:#00d8ff}.c1{stroke:#9b6cff}.c2{stroke:#00ffd1}.c3{stroke:#ffb84d}.c4{stroke:#ff5cab}.arrow{fill:none;stroke:#65e8ff;stroke-width:4}.track{fill:none;stroke:#376e9d;stroke-width:4}</style></defs><rect width="1400" height="780" rx="30" fill="url(#bg)"/><text x="55" y="62" class="title" text-anchor="start">HTTP intermediaries</text><g><rect x="90" y="115" width="570" height="190" rx="20" class="card c0"/><text x="375" y="157" class="cardTitle" text-anchor="middle"><tspan x="375" dy="0">Forward proxy</tspan></text><text x="375" y="193" class="small" text-anchor="middle"><tspan x="375" dy="0">Represents clients</tspan><tspan x="375" dy="25">Chosen by the client</tspan></text></g><g><rect x="740" y="115" width="570" height="190" rx="20" class="card c1"/><text x="1025" y="157" class="cardTitle" text-anchor="middle"><tspan x="1025" dy="0">Reverse proxy</tspan></text><text x="1025" y="193" class="small" text-anchor="middle"><tspan x="1025" dy="0">Represents servers</tspan><tspan x="1025" dy="25">Selects an upstream</tspan></text></g><g><rect x="90" y="335" width="570" height="190" rx="20" class="card c2"/><text x="375" y="377" class="cardTitle" text-anchor="middle"><tspan x="375" dy="0">Gateway</tspan></text><text x="375" y="413" class="small" text-anchor="middle"><tspan x="375" dy="0">Translates or connects environments</tspan><tspan x="375" dy="25">Acts as an origin</tspan></text></g><g><rect x="740" y="335" width="570" height="190" rx="20" class="card c3"/><text x="1025" y="377" class="cardTitle" text-anchor="middle"><tspan x="1025" dy="0">Tunnel</tspan></text><text x="1025" y="413" class="small" text-anchor="middle"><tspan x="1025" dy="0">Forwards bytes</tspan><tspan x="1025" dy="25">Example: CONNECT</tspan></text></g></svg>