<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="Uso de credenciais em um API Gateway"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#bc78ff"/><stop offset=".5" stop-color="#27d8ff"/><stop offset="1" stop-color="#35f2c1"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="context-stroke"/></marker></defs><rect width="1200" height="620" rx="28" fill="#070d22"/><path d="M0 95H1200M0 548H1200" stroke="#28416e" opacity=".35"/><text x="60" y="68" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="700">Uso de credenciais em um API Gateway</text><rect x="40" y="165" width="250" height="180" rx="19" fill="#0d1732" stroke="#27d8ff" stroke-width="2"/><circle cx="165" cy="202" r="12" fill="#27d8ff" filter="url(#glow)"/><text x="165" y="245" text-anchor="middle" fill="#27d8ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750">Consumidor</text><text x="165" y="287" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500"><tspan x="165" dy="0">Basic, Digest ou key</tspan></text><path d="M290 250L330 250" fill="none" stroke="#27d8ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="330" y="165" width="250" height="180" rx="19" fill="#0d1732" stroke="#bc78ff" stroke-width="2"/><circle cx="455" cy="202" r="12" fill="#bc78ff" filter="url(#glow)"/><text x="455" y="245" text-anchor="middle" fill="#bc78ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750">Gateway</text><text x="455" y="287" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500"><tspan x="455" dy="0">validação e política</tspan></text><path d="M580 250L620 250" fill="none" stroke="#bc78ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="620" y="165" width="250" height="180" rx="19" fill="#0d1732" stroke="#ffbd59" stroke-width="2"/><circle cx="745" cy="202" r="12" fill="#ffbd59" filter="url(#glow)"/><text x="745" y="245" text-anchor="middle" fill="#ffbd59" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750">Secret store</text><text x="745" y="287" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500"><tspan x="745" dy="0">hash, metadata e</tspan><tspan x="745" dy="22.1">status</tspan></text><path d="M870 250L910 250" fill="none" stroke="#ffbd59" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="910" y="165" width="250" height="180" rx="19" fill="#0d1732" stroke="#35f2c1" stroke-width="2"/><circle cx="1035" cy="202" r="12" fill="#35f2c1" filter="url(#glow)"/><text x="1035" y="245" text-anchor="middle" fill="#35f2c1" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="750">Backend</text><text x="1035" y="287" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500"><tspan x="1035" dy="0">identidade confiável</tspan></text><rect x="105" y="415" width="990" height="100" rx="19" fill="#0d1732" stroke="url(#g)" stroke-width="2"/><text x="600" y="456" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600"><tspan x="600" dy="0">O gateway não repassa a credencial original quando pode encaminhar identidade</tspan><tspan x="600" dy="26">interna limitada e auditável.</tspan></text></svg>