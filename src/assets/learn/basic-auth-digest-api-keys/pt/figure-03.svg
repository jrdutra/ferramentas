<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="Digest: desafio, nonce e prova calculada"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#bc78ff"/><stop offset=".5" stop-color="#27d8ff"/><stop offset="1" stop-color="#35f2c1"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="context-stroke"/></marker></defs><rect width="1200" height="620" rx="28" fill="#070d22"/><path d="M0 95H1200M0 548H1200" stroke="#28416e" opacity=".35"/><text x="60" y="68" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="700">Digest: desafio, nonce e prova calculada</text><rect x="60" y="175" width="300" height="170" rx="19" fill="#0d1732" stroke="#27d8ff" stroke-width="2"/><text x="210" y="220" text-anchor="middle" fill="#27d8ff" font-family="Inter,Arial,sans-serif" font-size="26" font-weight="750">Cliente</text><text x="210" y="270" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="500">conhece o segredo</text><rect x="840" y="175" width="300" height="170" rx="19" fill="#0d1732" stroke="#35f2c1" stroke-width="2"/><text x="990" y="220" text-anchor="middle" fill="#35f2c1" font-family="Inter,Arial,sans-serif" font-size="26" font-weight="750">Servidor</text><text x="990" y="270" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="500">valida a prova</text><path d="M360 195L840 195" fill="none" stroke="#27d8ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><text x="600" y="178" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="650">1. request sem prova</text><path d="M840 255L360 255" fill="none" stroke="#bc78ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><text x="600" y="238" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="650">2. 401 + realm + nonce + qop</text><path d="M360 315L840 315" fill="none" stroke="#ffbd59" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><text x="600" y="292" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="650"><tspan x="600" dy="0">3. response = hash(método, URI, segredo, nonce,</tspan><tspan x="600" dy="20.8">contador)</tspan></text><rect x="100" y="415" width="1000" height="100" rx="19" fill="#0d1732" stroke="url(#g)" stroke-width="2"/><text x="600" y="456" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600"><tspan x="600" dy="0">A senha não trafega diretamente, mas a segurança depende do algoritmo, da</tspan><tspan x="600" dy="26">qualidade da senha e do nonce.</tspan></text></svg>