ilter="url(#glow)"/><rect x="620" y="160" width="250" height="170" rx="19" fill="#0d1732" stroke="#ffbd59" stroke-width="2"/><text x="745" y="220" text-anchor="middle" fill="#ffbd59" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="700">Authorization: Basic ...</text><text x="745" y="270" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500"><tspan x="745" dy="0">header HTTP</tspan></text><path d="M870 245L915 245" fill="none" stroke="#ffbd59" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="915" y="160" width="250" height="170" rx="19" fill="#0d1732" stroke="#35f2c1" stroke-width="2"/><text x="1040" y="220" text-anchor="middle" fill="#35f2c1" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="700">TLS</text><text x="1040" y="270" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="500"><tspan x="1040" dy="0">confidencialidad del</tspan><tspan x="1040" dy="22.1">canal</tspan></text><rect x="115" y="410" width="970" height="100" rx="19" fill="#0d1732" stroke="#ff6f91" stroke-width="2"/><text x="600" y="451" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600"><tspan x="600" dy="0">Sin TLS, un observador puede recuperar el usuario y la contraseña decodificando</tspan><tspan x="600" dy="26">el valor Base64.</tspan></text></svg>