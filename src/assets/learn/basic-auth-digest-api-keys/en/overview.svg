<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="Three mechanisms, very different properties"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#bc78ff"/><stop offset=".5" stop-color="#27d8ff"/><stop offset="1" stop-color="#35f2c1"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="context-stroke"/></marker></defs><rect width="1200" height="620" rx="28" fill="#070d22"/><path d="M0 95H1200M0 548H1200" stroke="#28416e" opacity=".35"/><text x="60" y="68" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="700">Three mechanisms, very different properties</text><rect x="80" y="155" width="280" height="190" rx="19" fill="#0d1732" stroke="#27d8ff" stroke-width="2"/><circle cx="220" cy="195" r="13" fill="#27d8ff" filter="url(#glow)"/><text x="220" y="245" text-anchor="middle" fill="#27d8ff" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="750">Basic Auth</text><text x="220" y="290" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="550"><tspan x="220" dy="0">user and password on</tspan><tspan x="220" dy="23.400000000000002">every call</tspan></text><rect x="460" y="155" width="280" height="190" rx="19" fill="#0d1732" stroke="#bc78ff" stroke-width="2"/><circle cx="600" cy="195" r="13" fill="#bc78ff" filter="url(#glow)"/><text x="600" y="245" text-anchor="middle" fill="#bc78ff" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="750">Digest</text><text x="600" y="290" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="550"><tspan x="600" dy="0">hash-based</tspan><tspan x="600" dy="23.400000000000002">challenge-response</tspan></text><rect x="840" y="155" width="280" height="190" rx="19" fill="#0d1732" stroke="#35f2c1" stroke-width="2"/><circle cx="980" cy="195" r="13" fill="#35f2c1" filter="url(#glow)"/><text x="980" y="245" text-anchor="middle" fill="#35f2c1" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="750">API Key</text><text x="980" y="290" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="550"><tspan x="980" dy="0">secret application</tspan><tspan x="980" dy="23.400000000000002">identifier</tspan></text><rect x="120" y="405" width="960" height="105" rx="19" fill="#0d1732" stroke="url(#g)" stroke-width="2"/><text x="600" y="447" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="650"><tspan x="600" dy="0">All depend on TLS, secret management, least privilege, rotation, and</tspan><tspan x="600" dy="26">observability for secure use.</tspan></text></svg>