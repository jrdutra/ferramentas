<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
<title id="title">Gateway: conexiones independientes, pooling y consumo de puertos</title><desc id="desc">Gateway: conexiones independientes, pooling y consumo de puertos</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#111236"/></linearGradient><linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#00ffd1"/><stop offset="1" stop-color="#38a8ff"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#5de7ff"/></marker></defs>
<rect width="100%" height="100%" rx="26" fill="url(#bg)"/><g font-family="Arial, sans-serif"><text x="600" y="50" text-anchor="middle" fill="#f3f7ff" font-size="30" font-weight="700">Gateway: conexiones independientes, pooling y consumo de puertos</text><rect x="55" y="130" width="210" height="100" rx="16" fill="#0b2038" stroke="#38a8ff" stroke-width="3"/><text x="160.0" y="164" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">Consumidor</text><text x="160.0" y="192" text-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="160.0" dy="0">192.0.2.50:51234</tspan></text><rect x="355" y="120" width="230" height="120" rx="16" fill="#1b1a3d" stroke="#b889ff" stroke-width="3"/><text x="470.0" y="154" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">API Gateway</text><text x="470.0" y="182" text-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="470.0" dy="0">frontside + backside</tspan></text><rect x="685" y="130" width="210" height="100" rx="16" fill="#332a17" stroke="#ffc438" stroke-width="3"/><text x="790.0" y="164" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">NAT / SNAT</text><text x="790.0" y="192" text-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="790.0" dy="0">IP y puerto traducidos</tspan></text><rect x="980" y="130" width="165" height="100" rx="16" fill="#172d23" stroke="#8cdc75" stroke-width="3"/><text x="1062.5" y="164" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">Backend</text><text x="1062.5" y="192" text-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="1062.5" dy="0">10.0.8.20:443</tspan></text><line x1="265" y1="180" x2="355" y2="180" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><line x1="585" y1="180" x2="685" y2="180" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><line x1="895" y1="180" x2="980" y2="180" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="210" y="270" text-anchor="middle" fill="#91a6bd" font-size="14" font-weight="400">Conexión 1: cliente -&gt; gateway</text><text x="790" y="270" text-anchor="middle" fill="#91a6bd" font-size="14" font-weight="400">Conexión 2: gateway -&gt; backend</text><rect x="150" y="320" width="900" height="150" rx="20" fill="#0c1c31" stroke="#668099" stroke-width="3"/><text x="190" y="360" text-anchor="start" fill="#f3f7ff" font-size="20" font-weight="700">Pool de conexiones persistentes</text><text x="190" y="400" text-anchor="start" fill="#b8c9da" font-size="15" font-weight="400">Reutilizar conexiones reduce handshakes, latencia y presión sobre puertos efímeros/SNAT.</text><text x="190" y="435" text-anchor="start" fill="#b8c9da" font-size="15" font-weight="400">Abrir y cerrar conexiones a alta velocidad puede acumular TIME_WAIT y causar fallos intermitentes.</text><text x="600" y="545" text-anchor="middle" fill="#91a6bd" font-size="13" font-weight="400">Cada hop puede tener timeouts, buffers y políticas diferentes. El estado HTTP visto por el cliente puede representar un fallo ocurrido únicamente en el hop gateway-backend.</text></g></svg>