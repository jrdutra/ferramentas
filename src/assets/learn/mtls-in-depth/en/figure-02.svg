    <path d="M40 102H1160" stroke="#243e72" stroke-width="2"/><text x="60" y="70" fill="#f2f7ff" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="700">mTLS handshake in TLS 1.3</text>
    <g><rect x="120" y="120" width="190" height="75" rx="20" fill="#0d2b55" stroke="#21d4fd" stroke-width="3"/><rect x="130" y="130" width="170" height="55" rx="14" fill="#0b1732" opacity=".45"/><text x="215" y="164.5" text-anchor="middle" fill="#e9f8ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="650">Client</text></g><g><rect x="890" y="120" width="190" height="75" rx="20" fill="#123c42" stroke="#34d399" stroke-width="3"/><rect x="900" y="130" width="170" height="55" rx="14" fill="#0b1732" opacity=".45"/><text x="985" y="164.5" text-anchor="middle" fill="#ecfdf5" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="650">Server</text></g><path d="M215 200V570M985 200V570" stroke="#416190" stroke-width="3" stroke-dasharray="10 10"/><g><path d="M225 235L975 235" stroke="url(#line)" stroke-width="5" fill="none" marker-end="url(#arrow)"  filter="url(#glow)"/><text x="600" y="219" text-anchor="middle" fill="#d9f7ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600">ClientHello</text></g><g><path d="M975 287L225 287" stroke="url(#line)" stroke-width="5" fill="none" marker-end="url(#arrow)"  filter="url(#glow)"/><text x="600" y="271" text-anchor="middle" fill="#d9f7ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600">ServerHello + CertificateRequest</text></g><g><path d="M975 339L225 339" stroke="url(#line)" stroke-width="5" fill="none" marker-end="url(#arrow)"  filter="url(#glow)"/><text x="600" y="323" text-anchor="middle" fill="#d9f7ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600">Server certificate</text></g><g><path d="M225 391L975 391" stroke="url(#line)" stroke-width="5" fill="none" marker-end="url(#arrow)"  filter="url(#glow)"/><text x="600" y="375" text-anchor="middle" fill="#d9f7ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600">Client certificate</text></g><g><path d="M225 443L975 443" stroke="url(#line)" stroke-width="5" fill="none" marker-end="url(#arrow)"  filter="url(#glow)"/><text x="600" y="427" text-anchor="middle" fill="#d9f7ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600">CertificateVerify</text></g><g><path d="M225 495L975 495" stroke="url(#line)" stroke-width="5" fill="none" marker-end="url(#arrow)"  filter="url(#glow)"/><text x="600" y="479" text-anchor="middle" fill="#d9f7ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600">Finished</text></g></svg>