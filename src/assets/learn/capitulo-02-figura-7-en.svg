<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
<title id="title">TCP and UDP: different services for the application</title><desc id="desc">TCP and UDP: different services for the application</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#111236"/></linearGradient><linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#00ffd1"/><stop offset="1" stop-color="#38a8ff"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#5de7ff"/></marker></defs>
<rect width="100%" height="100%" rx="26" fill="url(#bg)"/><g font-family="Arial, sans-serif"><text x="600" y="50" text-anchor="middle" fill="#f3f7ff" font-size="30" font-weight="700">TCP and UDP: different services for the application</text><rect x="90" y="100" width="470" height="390" rx="16" fill="#0b263d" stroke="#38a8ff" stroke-width="3"/><text x="325.0" y="134" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">TCP</text><rect x="640" y="100" width="470" height="390" rx="16" fill="#172d23" stroke="#8cdc75" stroke-width="3"/><text x="875.0" y="134" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">UDP</text><text x="130" y="160" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• connection-oriented</text><text x="130" y="198" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• byte stream</text><text x="130" y="236" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• ordering</text><text x="130" y="274" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• retransmission</text><text x="130" y="312" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• flow control</text><text x="130" y="350" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• congestion control</text><text x="130" y="388" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• handshake and state</text><text x="130" y="426" text-anchor="start" fill="#dcecff" font-size="16" font-weight="400">• HTTP/1.1 and HTTP/2</text><text x="680" y="160" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• connectionless protocol</text><text x="680" y="198" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• preserved datagrams</text><text x="680" y="236" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• no delivery guarantee</text><text x="680" y="274" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• no native ordering</text><text x="680" y="312" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• small header</text><text x="680" y="350" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• low overhead</text><text x="680" y="388" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• application adds guarantees</text><text x="680" y="426" text-anchor="start" fill="#e2f7dc" font-size="16" font-weight="400">• DNS and QUIC/HTTP/3</text><text x="600" y="555" text-anchor="middle" fill="#91a6bd" font-size="13" font-weight="400">There is no universally “better” protocol. The choice depends on semantics, loss tolerance, latency, volume, and guarantees implemented by the application.</text></g></svg>