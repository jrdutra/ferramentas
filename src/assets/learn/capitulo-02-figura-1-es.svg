t-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="1000.0" dy="0">10.20.30.40:443</tspan></text><line x1="350" y1="151" x2="470" y2="250" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><line x1="350" y1="271" x2="470" y2="250" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><line x1="350" y1="391" x2="470" y2="250" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><line x1="730" y1="265" x2="880" y2="265" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="600" y="540" text-anchor="middle" fill="#91a6bd" font-size="14" font-weight="400">Una conexión TCP se distingue, en general, por: protocolo + IP de origen + puerto de origen + IP de destino + puerto de destino.</text></g></svg>