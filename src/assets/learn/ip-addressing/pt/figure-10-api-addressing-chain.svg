<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-label="Diagrama educacional sobre endereçamento IP: Cadeia de endereços em uma API">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071a34"/><stop offset="1" stop-color="#030817"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#00ffd1"/><stop offset="1" stop-color="#009cff"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#9c5bff"/><stop offset="1" stop-color="#ff2db2"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#55dfff"/></marker>
    <style>
      text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#dcecff}.title{font-size:30px;font-weight:800}.label{font-size:24px;font-weight:700}.value{font-size:25px;font-weight:800}.small{font-size:20px;font-weight:600;fill:#a9c3d8}.eyebrow{font-size:17px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;fill:#7eeaff}.mono{font-family:Cascadia Code,Consolas,monospace;font-size:22px;font-weight:700}.card rect{fill:#07172d;stroke:#2e5d88;stroke-width:2}.card.cyan rect{stroke:#00d0ff}.card.violet rect{stroke:#a55dff}.card.green rect{stroke:#00ffd1}.arrow{fill:none;stroke:#55dfff;stroke-width:4}.muted{fill:#6f8ba5}.bright{fill:#00ffd1}.violetText{fill:#c18cff}.pill{fill:#081b35;stroke:#3c78a8;stroke-width:2}.highlight{fill:#0b2840;stroke:#00ffd1;stroke-width:3;filter:url(#glow)}
    </style>
  </defs>
  <rect width="1200" height="650" rx="28" fill="url(#bg)"/>
  <path d="M0 520 C280 430 420 650 710 535 S1040 460 1200 535" fill="none" stroke="#5534a5" stroke-opacity=".25" stroke-width="3"/>
  <text x="56" y="58" class="title" text-anchor="start">Cadeia de endereços em uma API</text>
  <g class="card cyan"><rect x="40" y="180" width="250" height="125" rx="22"/><text x="64" y="218" class="eyebrow" text-anchor="start">Consumidor</text><text x="165" y="268" class="value" text-anchor="middle">192.0.2.25</text></g><g class="card violet"><rect x="330" y="180" width="250" height="125" rx="22"/><text x="354" y="218" class="eyebrow" text-anchor="start">WAF / Balanceador</text><text x="455" y="268" class="value" text-anchor="middle">203.0.113.20</text></g><g class="card cyan"><rect x="620" y="180" width="250" height="125" rx="22"/><text x="644" y="218" class="eyebrow" text-anchor="start">API Gateway</text><text x="745" y="268" class="value" text-anchor="middle">10.20.4.10</text></g><g class="card violet"><rect x="910" y="180" width="250" height="125" rx="22"/><text x="934" y="218" class="eyebrow" text-anchor="start">Backend</text><text x="1035" y="268" class="value" text-anchor="middle">10.30.8.25</text></g><g><path d="M 290 242 L 320 242" class="arrow" marker-end="url(#arrow)"/></g><g><path d="M 580 242 L 610 242" class="arrow" marker-end="url(#arrow)"/></g><g><path d="M 870 242 L 900 242" class="arrow" marker-end="url(#arrow)"/></g><text x="455" y="375" class="small" text-anchor="middle">Endereço de entrada</text><text x="745" y="375" class="small" text-anchor="middle">Origem de saída / SNAT</text><rect x="100" y="440" width="1000" height="105" rx="22" class="pill"/><text x="600" y="470" class="small" text-anchor="middle"><tspan x="600" dy="0">Cada salto pode resolver, rotear e traduzir de forma independente</tspan><tspan x="600" dy="27">DNS → Decisão de rota → NAT</tspan><tspan x="600" dy="27">Endereço observado: socket IP + cadeia de encaminhamento confiável</tspan></text>
  </svg>