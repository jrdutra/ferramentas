<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
<title id="title">Secuencia, ACK acumulativo y retransmisión</title><desc id="desc">Secuencia, ACK acumulativo y retransmisión</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#111236"/></linearGradient><linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#00ffd1"/><stop offset="1" stop-color="#38a8ff"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#5de7ff"/></marker></defs>
<rect width="100%" height="100%" rx="26" fill="url(#bg)"/><g font-family="Arial, sans-serif"><text x="600" y="50" text-anchor="middle" fill="#f3f7ff" font-size="30" font-weight="700">Secuencia, ACK acumulativo y retransmisión</text><text x="190" y="100" text-anchor="middle" fill="#00ffd1" font-size="19" font-weight="700">Emisor</text><text x="1010" y="100" text-anchor="middle" fill="#b5ff9a" font-size="19" font-weight="700">Receptor</text><line x1="190" y1="120" x2="190" y2="500" stroke="#668099" stroke-width="3"/><line x1="1010" y1="120" x2="1010" y2="500" stroke="#668099" stroke-width="3"/><line x1="190" y1="165" x2="1010" y2="193" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="600.0" y="169.0" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">SEQ 1000, 500 bytes</text><line x1="190" y1="230" x2="1010" y2="258" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="600.0" y="234.0" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">SEQ 1500, 500 bytes</text><line x1="190" y1="295" x2="1010" y2="323" stroke="#ff5c6f" stroke-width="3" marker-end="url(#arrow)"/><text x="600.0" y="299.0" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">SEQ 2000, 500 bytes (perdido)</text><line x1="190" y1="360" x2="1010" y2="388" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="600.0" y="364.0" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">SEQ 2500, 500 bytes</text><path d="M590 286l24 24m0-24l-24 24" stroke="#ff4057" stroke-width="7"/><line x1="1010" y1="420" x2="190" y2="420" stroke="#b889ff" stroke-width="3" marker-end="url(#arrow)"/><text x="600.0" y="410.0" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">ACK 2000 (aún espera el byte 2000)</text><line x1="190" y1="480" x2="1010" y2="505" stroke="#ff5c6f" stroke-width="3" marker-end="url(#arrow)"/><text x="600.0" y="482.5" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">Retransmisión: SEQ 2000, 500 bytes</text><text x="600" y="565" text-anchor="middle" fill="#91a6bd" font-size="13" font-weight="400">TCP entrega un flujo ordenado de bytes. Los datos recibidos fuera de orden pueden almacenarse, pero el ACK acumulativo indica el siguiente byte esperado.</text></g></svg>