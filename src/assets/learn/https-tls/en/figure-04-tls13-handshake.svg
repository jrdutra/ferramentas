<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc"><title id="title">TLS 1.3 handshake</title><desc id="desc">Fewer round trips, obsolete options removed, and more of the handshake encrypted.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#020617"/><stop offset=".55" stop-color="#071426"/><stop offset="1" stop-color="#11104a"/></linearGradient><linearGradient id="card0" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b2442"/><stop offset="1" stop-color="#101a3a"/></linearGradient><linearGradient id="card1" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111c44"/><stop offset="1" stop-color="#23154a"/></linearGradient><linearGradient id="card2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#12243d"/><stop offset="1" stop-color="#151b35"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#67e8f9"/></marker><pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse"><path d="M42 0H0V42" fill="none" stroke="#1d4ed8" stroke-width="1" opacity=".12"/></pattern></defs><rect width="1400" height="780" rx="28" fill="url(#bg)"/><rect width="1400" height="780" rx="28" fill="url(#grid)"/><circle cx="165" cy="115" r="115" fill="#0ea5e9" opacity=".08"/><circle cx="1240" cy="650" r="170" fill="#7c3aed" opacity=".09"/><text x="700" y="80" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="38" font-weight="800" text-anchor="middle"><tspan x="700" dy="0">TLS 1.3 handshake</tspan></text><text x="700" y="142" fill="#93c5fd" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="500" text-anchor="middle"><tspan x="700" dy="0">Fewer round trips, obsolete options removed, and more of the handshake encrypted.</tspan></text><g><rect x="62" y="252" width="240.8" height="345" rx="24" fill="url(#card0)" stroke="#38bdf8" stroke-width="2.5"/><rect x="78" y="269" width="208.8" height="8" rx="4" fill="#38bdf8" opacity=".9"/><text x="182.4" y="324" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="750" text-anchor="middle"><tspan x="182.4" dy="0">Client</tspan></text><text x="182.4" y="370.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="500" text-anchor="middle"><tspan x="182.4" dy="0">ClientHello +</tspan><tspan x="182.4" dy="21.08">key_share</tspan></text><text x="182.4" y="430.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="500" text-anchor="middle"><tspan x="182.4" dy="0">Versions, SNI, and</tspan><tspan x="182.4" dy="21.08">ALPN</tspan></text><circle cx="182.4" cy="569" r="8" fill="#38bdf8" filter="url(#glow)"/><path d="M 306.8 424.5 H 316.8" stroke="#67e8f9" stroke-width="4" marker-end="url(#arrow)" opacity=".75"/></g><g><rect x="320.8" y="252" width="240.8" height="345" rx="24" fill="url(#card1)" stroke="#818cf8" stroke-width="2.5"/><rect x="336.8" y="269" width="208.8" height="8" rx="4" fill="#818cf8" opacity=".9"/><text x="441.20000000000005" y="324" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="750" text-anchor="middle"><tspan x="441.20000000000005" dy="0">Server</tspan></text><text x="441.20000000000005" y="370.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="500" text-anchor="middle"><tspan x="441.20000000000005" dy="0">ServerHello</tspan></text><text x="441.20000000000005" y="430.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="500" text-anchor="middle"><tspan x="441.20000000000005" dy="0">EncryptedExtensions</tspan></text><circle cx="441.20000000000005" cy="569" r="8" fill="#818cf8" filter="url(#glow)"/><path d="M 565.6 424.5 H 575.6" stroke="#67e8f9" stroke-width="4" marker-end="url(#arrow)" opacity=".75"/></g><g><rect x="579.6" y="252" width="240.8" height="345" rx="24" fill="url(#card2)" stroke="#c084fc" stroke-width="2.5"/><rect x="595.6" y="269" width="208.8" height="8" rx="4" fill="#c084fc" opacity=".9"/><text x="700" y="324" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="750" text-anchor="middle"><tspan x="700" dy="0">Server</tspan></text><text x="700" y="370.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="500" text-anchor="middle"><tspan x="700" dy="0">Certificate</tspan></text><text x="700" y="430.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="500" text-anchor="middle"><tspan x="700" dy="0">CertificateVerify +</tspan><tspan x="700" dy="21.08">Finished</tspan></text><circle cx="700" cy="569" r="8" fill="#c084fc" filter="url(#glow)"/><path d="M 824.4000000000001 424.5 H 834.4000000000001" stroke="#67e8f9" stroke-width="4" marker-end="url(#arrow)" opacity=".75"/></g><g><rect x="838.4000000000001" y="252" width="240.8" height="345" rx="24" fill="url(#card0)" stroke="#22d3ee" stroke-width="2.5"/><rect x="854.4000000000001" y="269" width="208.8" height="8" rx="4" fill="#22d3ee" opacity=".9"/><text x="958.8000000000001" y="324" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="750" text-anchor="middle"><tspan x="958.8000000000001" dy="0">Client</tspan></text><text x="958.8000000000001" y="370.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="500" text-anchor="middle"><tspan x="958.8000000000001" dy="0">Finished</tspan></text><text x="958.8000000000001" y="430.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="500" text-anchor="middle"><tspan x="958.8000000000001" dy="0">Confirms negotiation</tspan></text><circle cx="958.8000000000001" cy="569" r="8" fill="#22d3ee" filter="url(#glow)"/><path d="M 1083.2 424.5 H 1093.2" stroke="#67e8f9" stroke-width="4" marker-end="url(#arrow)" opacity=".75"/></g><g><rect x="1097.2" y="252" width="240.8" height="345" rx="24" fill="url(#card1)" stroke="#60a5fa" stroke-width="2.5"/><rect x="1113.2" y="269" width="208.8" height="8" rx="4" fill="#60a5fa" opacity=".9"/><text x="1217.6000000000001" y="324" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="750" text-anchor="middle"><tspan x="1217.6000000000001" dy="0">Application</tspan></text><text x="1217.6000000000001" y="370.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="500" text-anchor="middle"><tspan x="1217.6000000000001" dy="0">Protected data</tspan></text><text x="1217.6000000000001" y="430.4" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="500" text-anchor="middle"><tspan x="1217.6000000000001" dy="0">HTTP/1.1, HTTP/2, or</tspan><tspan x="1217.6000000000001" dy="21.08">another protocol</tspan></text><circle cx="1217.6000000000001" cy="569" r="8" fill="#60a5fa" filter="url(#glow)"/></g><path d="M70 688 H1330" stroke="#334155" stroke-width="1"/><text x="70" y="730" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">FAAC · 04</text></svg>