<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="WebSocket operational flow"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#bc78ff"/><stop offset=".5" stop-color="#35f2c1"/><stop offset="1" stop-color="#ffbd59"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="context-stroke"/></marker></defs><rect width="1200" height="620" rx="28" fill="#070d22"/><path d="M0 95H1200M0 540H1200" stroke="#28416e" opacity=".35"/><text x="60" y="68" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="700">WebSocket operational flow</text><rect x="25" y="165" width="200" height="150" rx="20" fill="#0d1732" stroke="#bc78ff" stroke-width="2"/><circle cx="125" cy="200" r="12" fill="#bc78ff" filter="url(#glow)"/><text x="125" y="245" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700">HTTP Upgrade</text><text x="125" y="280" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500">handshake</text><path d="M225 240L260 240" fill="none" stroke="#bc78ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="260" y="165" width="200" height="150" rx="20" fill="#0d1732" stroke="#27d8ff" stroke-width="2"/><circle cx="360" cy="200" r="12" fill="#27d8ff" filter="url(#glow)"/><text x="360" y="245" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700">Open connection</text><text x="360" y="280" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500">persistent channel</text><path d="M460 240L495 240" fill="none" stroke="#27d8ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="495" y="165" width="200" height="150" rx="20" fill="#0d1732" stroke="#35f2c1" stroke-width="2"/><circle cx="595" cy="200" r="12" fill="#35f2c1" filter="url(#glow)"/><text x="595" y="245" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700">Frames / events</text><text x="595" y="280" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500">full-duplex</text><path d="M695 240L730 240" fill="none" stroke="#35f2c1" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="730" y="165" width="200" height="150" rx="20" fill="#0d1732" stroke="#ffbd59" stroke-width="2"/><circle cx="830" cy="200" r="12" fill="#ffbd59" filter="url(#glow)"/><text x="830" y="245" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700">Ping / Pong</text><text x="830" y="280" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500">liveness</text><path d="M930 240L965 240" fill="none" stroke="#ffbd59" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="965" y="165" width="200" height="150" rx="20" fill="#0d1732" stroke="#bc78ff" stroke-width="2"/><circle cx="1065" cy="200" r="12" fill="#bc78ff" filter="url(#glow)"/><text x="1065" y="245" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700">Close handshake</text><text x="1065" y="280" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500">termination</text><path d="M135 355C300 470 900 470 1065 355" fill="none" stroke="url(#g)" stroke-width="7" filter="url(#glow)"/><path d="M1065 390C900 505 300 505 135 390" fill="none" stroke="url(#g)" stroke-width="3" marker-end="url(#arrow)"/><rect x="125" y="505" width="950" height="65" rx="20" fill="#0d1732" stroke="#28416e" stroke-width="2"/><text x="600" y="545" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500">After the upgrade, communication leaves the request/response model and exchanges frames in both directions.</text></svg>