<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="From identity to access decision"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#bc78ff"/><stop offset=".5" stop-color="#27d8ff"/><stop offset="1" stop-color="#35f2c1"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="context-stroke"/></marker></defs><rect width="1200" height="620" rx="28" fill="#070d22"/><path d="M0 95H1200M0 540H1200" stroke="#28416e" opacity=".35"/><text x="60" y="68" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="700">From identity to access decision</text><rect x="30" y="150" width="205" height="160" rx="19" fill="#0d1732" stroke="#bc78ff" stroke-width="2"/><circle cx="132" cy="185" r="12" fill="#bc78ff" filter="url(#glow)"/><text x="132" y="230" text-anchor="middle" fill="#bc78ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700">Subject</text><text x="132" y="270" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500"><tspan x="132" dy="0">user or workload</tspan></text><path d="M235 230L265 230" fill="none" stroke="#bc78ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="265" y="150" width="205" height="160" rx="19" fill="#0d1732" stroke="#ffbd59" stroke-width="2"/><circle cx="367" cy="185" r="12" fill="#ffbd59" filter="url(#glow)"/><text x="367" y="230" text-anchor="middle" fill="#ffbd59" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700">Credential</text><text x="367" y="270" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500"><tspan x="367" dy="0">secret, key, or</tspan><tspan x="367" dy="20.8">factor</tspan></text><path d="M470 230L500 230" fill="none" stroke="#ffbd59" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="500" y="150" width="205" height="160" rx="19" fill="#0d1732" stroke="#27d8ff" stroke-width="2"/><circle cx="602" cy="185" r="12" fill="#27d8ff" filter="url(#glow)"/><text x="602" y="230" text-anchor="middle" fill="#27d8ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700">Authentication</text><text x="602" y="270" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500"><tspan x="602" dy="0">proof and context</tspan></text><path d="M705 230L735 230" fill="none" stroke="#27d8ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="735" y="150" width="205" height="160" rx="19" fill="#0d1732" stroke="#35f2c1" stroke-width="2"/><circle cx="837" cy="185" r="12" fill="#35f2c1" filter="url(#glow)"/><text x="837" y="230" text-anchor="middle" fill="#35f2c1" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700">Token / session</text><text x="837" y="270" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500"><tspan x="837" dy="0">temporary</tspan><tspan x="837" dy="20.8">assertion</tspan></text><path d="M940 230L970 230" fill="none" stroke="#35f2c1" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="970" y="150" width="205" height="160" rx="19" fill="#0d1732" stroke="#35f2c1" stroke-width="2"/><circle cx="1072" cy="185" r="12" fill="#35f2c1" filter="url(#glow)"/><text x="1072" y="230" text-anchor="middle" fill="#35f2c1" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700">Authorization</text><text x="1072" y="270" text-anchor="middle" fill="#a9bbd1" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500"><tspan x="1072" dy="0">policy and</tspan><tspan x="1072" dy="20.8">resource</tspan></text><path d="M132 345V390H1068V345" fill="none" stroke="url(#g)" stroke-width="4"/><rect x="135" y="390" width="930" height="115" rx="19" fill="#0d1732" stroke="url(#g)" stroke-width="2"/><text x="600" y="438" text-anchor="middle" fill="#eff7ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="650"><tspan x="600" dy="0">Authentication proves who or what is calling; authorization decides what</tspan><tspan x="600" dy="26">that identity may do now.</tspan></text></svg>