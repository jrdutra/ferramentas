<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
<title id="title">TCP closing: FIN, ACK, half-close, and TIME_WAIT</title><desc id="desc">TCP closing: FIN, ACK, half-close, and TIME_WAIT</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#111236"/></linearGradient><linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#00ffd1"/><stop offset="1" stop-color="#38a8ff"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#5de7ff"/></marker></defs>
<rect width="100%" height="100%" rx="26" fill="url(#bg)"/><g font-family="Arial, sans-serif"><text x="600" y="50" text-anchor="middle" fill="#f3f7ff" font-size="30" font-weight="700">TCP closing: FIN, ACK, half-close, and TIME_WAIT</text><text x="190" y="100" text-anchor="middle" fill="#00ffd1" font-size="19" font-weight="700">Side A</text><text x="1010" y="100" text-anchor="middle" fill="#b5ff9a" font-size="19" font-weight="700">Side B</text><line x1="190" y1="120" x2="190" y2="500" stroke="#668099" stroke-width="3"/><line x1="1010" y1="120" x2="1010" y2="500" stroke="#668099" stroke-width="3"/><line x1="190" y1="180" x2="1010" y2="220" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="600.0" y="190.0" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">FIN</text><line x1="1010" y1="275" x2="190" y2="310" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="600.0" y="282.5" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">ACK</text><rect x="330" y="320" width="540" height="55" rx="14" fill="#3b3218" stroke="#ffc438" stroke-width="3"/><text x="600" y="354" text-anchor="middle" fill="#ffe8a6" font-size="16" font-weight="400">A no longer sends; B can still transmit data</text><line x1="1010" y1="405" x2="190" y2="440" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="600.0" y="412.5" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">FIN</text><line x1="190" y1="485" x2="1010" y2="515" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="600.0" y="490.0" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">ACK</text><text x="600" y="570" text-anchor="middle" fill="#91a6bd" font-size="13" font-weight="400">The side that sends the final ACK normally remains in TIME_WAIT to absorb delayed segments and allow the final ACK to be retransmitted.</text></g></svg>