<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img"><rect width="1200" height="520" rx="30" fill="url(#bg)"/><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#061326"/><stop offset="1" stop-color="#120b2d"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#39d9ff"/></marker></defs><g font-family="Inter,Segoe UI,Arial,sans-serif"><text x="600" y="58" text-anchor="middle" fill="#f4f7ff" font-size="32" font-weight="700">Fluxo conceitual de federação e SSO</text><rect x="30" y="180" width="205" height="120" rx="18" fill="#0a1b34" stroke="#39d9ff" stroke-width="2"/><text x="132.5" y="220" text-anchor="middle" fill="#39d9ff" font-size="19" font-weight="700">1. Usuário</text><text x="132.5" y="255" text-anchor="middle" fill="#dbe8fb" font-size="16">acessa aplicação</text><path d="M235 240 L255 240" stroke="#39d9ff" stroke-width="3" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="265" y="180" width="205" height="120" rx="18" fill="#0a1b34" stroke="#ffcf6a" stroke-width="2"/><text x="367.5" y="220" text-anchor="middle" fill="#ffcf6a" font-size="19" font-weight="700">2. RP / SP</text><text x="367.5" y="255" text-anchor="middle" fill="#dbe8fb" font-size="16">redireciona</text><path d="M470 240 L490 240" stroke="#39d9ff" stroke-width="3" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="500" y="180" width="205" height="120" rx="18" fill="#0a1b34" stroke="#c682ff" stroke-width="2"/><text x="602.5" y="220" text-anchor="middle" fill="#c682ff" font-size="19" font-weight="700">3. IdP</text><text x="602.5" y="255" text-anchor="middle" fill="#dbe8fb" font-size="16">autentica</text><path d="M705 240 L725 240" stroke="#39d9ff" stroke-width="3" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="735" y="180" width="205" height="120" rx="18" fill="#0a1b34" stroke="#ff9c75" stroke-width="2"/><text x="837.5" y="220" text-anchor="middle" fill="#ff9c75" font-size="19" font-weight="700">4. Asserção</text><text x="837.5" y="255" text-anchor="middle" fill="#dbe8fb" font-size="16">retorna identidade</text><path d="M940 240 L960 240" stroke="#39d9ff" stroke-width="3" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="970" y="180" width="205" height="120" rx="18" fill="#0a1b34" stroke="#78e2ae" stroke-width="2"/><text x="1072.5" y="220" text-anchor="middle" fill="#78e2ae" font-size="19" font-weight="700">5. Aplicação</text><text x="1072.5" y="255" text-anchor="middle" fill="#dbe8fb" font-size="16">cria sessão local</text><rect x="100" y="438" width="1000" height="54" rx="14" fill="#091a32" stroke="#36537d"/><text x="600" y="471" text-anchor="middle" fill="#c8d7ee" font-size="17">Ao abrir outra aplicação, a sessão no IdP pode evitar um novo desafio.</text></g></svg>