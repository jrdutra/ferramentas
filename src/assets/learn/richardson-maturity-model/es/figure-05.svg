<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="Madurez REST en una arquitectura con API Gateway"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop stop-color="#061126"/><stop offset="1" stop-color="#17143d"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#45ddff"/></marker></defs><rect width="1200" height="620" rx="34" fill="url(#bg)"/><path d="M42 102H1158" stroke="#294572" stroke-width="2"/><text x="60" y="69" fill="#f4f8ff" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="700">Madurez REST en una arquitectura con API Gateway</text><g><rect x="35" y="220" width="245" height="140" rx="19" fill="#0b1d3e" stroke="#45b8f2" stroke-width="3"/><rect x="44" y="229" width="227" height="122" rx="13" fill="#142b58" opacity=".82"/><text x="157.5" y="281" text-anchor="middle" fill="#f4f8ff" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="700">Consumidor</text><text x="157.5" y="315" text-anchor="middle" fill="#bed8ef" font-family="Inter,Arial,sans-serif" font-size="17">links + métodos</text></g><path d="M280 290L330 290" stroke="#45ddff" stroke-width="5" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/><g><rect x="330" y="220" width="245" height="140" rx="19" fill="#0b1d3e" stroke="#f4c84b" stroke-width="3"/><rect x="339" y="229" width="227" height="122" rx="13" fill="#142b58" opacity=".82"/><text x="452.5" y="281" text-anchor="middle" fill="#f4f8ff" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="700">API Gateway</text><text x="452.5" y="315" text-anchor="middle" fill="#bed8ef" font-family="Inter,Arial,sans-serif" font-size="17">auth + cuotas + routing</text></g><path d="M575 290L625 290" stroke="#45ddff" stroke