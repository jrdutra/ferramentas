<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="The four cumulative RMM levels"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop stop-color="#061126"/><stop offset="1" stop-color="#17143d"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#45ddff"/></marker></defs><rect width="1200" height="620" rx="34" fill="url(#bg)"/><path d="M42 102H1158" stroke="#294572" stroke-width="2"/><text x="60" y="69" fill="#f4f8ff" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="700">The four cumulative RMM levels</text><g><rect x="35" y="220" width="250" height="150" rx="19" fill="#0b1d3e" stroke="#f97373" stroke-width="3"/><rect x="44" y="229" width="232" height="132" rx="13" fill="#142b58" opacity=".82"/><text x="160" y="286" text-anchor="middle" fill="#f4f8ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700">Level 0</text><text x="160" y="320" text-anchor="middle" fill="#bed8ef" font-family="Inter,Arial,sans-serif" font-size="17">Single endpoint</text></g><path d="M285 295L325 295" stroke="#45ddff" stroke-width="5" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/><g><rect x="325" y="220" width="250" height="150" rx="19" fill="#0b1d3e" stroke="#45b8f2" stroke-width="3"/><rect x="334" y="229" width="232" height="132" rx="13" fill="#142b58" opacity=".82"/><text x="450" y="286" text-anchor="middle" fill="#f4f8ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700">Level 1</text><text x="450" y="320" text-anchor="middle" fill="#bed8ef" font-family="Inter,Arial,sans-serif" font-size="17">Resources</text></g><path d="M575 295L615 295" stroke="#45ddff" stroke-width="5" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/><g><rect x="615" y="220" width="250" height="150" rx="19" fill="#0b1d3e" stroke="#f4c84b" stroke-width="3"/><rect x="624" y="229" width="232" height="132" rx="13" fill="#142b58" opacity=".82"/><text x="740" y="286" text-anchor="middle" fill="#f4f8ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700">Level 2</text><text x="740" y="320" text-anchor="middle" fill="#bed8ef" font-family="Inter,Arial,sans-serif" font-size="17">HTTP Semantics</text></g><path d="M865 295L905 295" stroke="#45ddff" stroke-width="5" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/><g><rect x="905" y="220" width="250" height="150" rx="19" fill="#0b1d3e" stroke="#75d58c" stroke-width="3"/><rect x="914" y="229" width="232" height="132" rx="13" fill="#142b58" opacity=".82"/><text x="1030" y="286" text-anchor="middle" fill="#f4f8ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700">Level 3</text><text x="1030" y="320" text-anchor="middle" fill="#bed8ef" font-family="Inter,Arial,sans-serif" font-size="17">Hypermedia</text></g><text x="600" y="500" text-anchor="middle" fill="#cfe7ff" font-family="Inter,Arial,sans-serif" font-size="19">Each level adds an observable interface capability.</text></svg>