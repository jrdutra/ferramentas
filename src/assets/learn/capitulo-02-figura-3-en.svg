<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
<title id="title">Three-way handshake and initial TCP negotiation</title><desc id="desc">Three-way handshake and initial TCP negotiation</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#111236"/></linearGradient><linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#00ffd1"/><stop offset="1" stop-color="#38a8ff"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#5de7ff"/></marker></defs>
<rect width="100%" height="100%" rx="26" fill="url(#bg)"/><g font-family="Arial, sans-serif"><text x="600" y="50" text-anchor="middle" fill="#f3f7ff" font-size="30" font-weight="700">Three-way handshake and initial TCP negotiation</text><text x="190" y="100" text-anchor="middle" fill="#00ffd1" font-size="19" font-weight="700">Client</text><text x="1010" y="100" text-anchor="middle" fill="#b5ff9a" font-size="19" font-weight="700">Server</text><line x1="190" y1="120" x2="190" y2="480" stroke="#668099" stroke-width="3"/><line x1="1010" y1="120" x2="1010" y2="480" stroke="#668099" stroke-width="3"/><line x1="190" y1="180" x2="1010" y2="230" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="600.0" y="195.0" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">SYN, seq=x</text><text x="600" y="200" text-anchor="middle" fill="#91a6bd" font-size="13" font-weight="400">MSS, Window Scale, SACK permitted, Timestamp</text><line x1="1010" y1="290" x2="190" y2="340" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="600.0" y="305.0" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">SYN + ACK, seq=y, ack=x+1</text><line x1="190" y1="400" x2="1010" y2="450" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="600.0" y="415.0" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">ACK, ack=y+1</text><rect x="350" y="500" width="500" height="54" rx="14" fill="#183326" stroke="#8cdc75" stroke-width="3"/><text x="600" y="534" text-anchor="middle" fill="#c9ffb9" font-size="16" font-weight="400">ESTABLISHED connection: applications can exchange bytes</text></g></svg>