<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
<title id="title">Ciclo de vida de sockets TCP: servidor e cliente</title><desc id="desc">Ciclo de vida de sockets TCP: servidor e cliente</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#111236"/></linearGradient><linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#00ffd1"/><stop offset="1" stop-color="#38a8ff"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#5de7ff"/></marker></defs>
<rect width="100%" height="100%" rx="26" fill="url(#bg)"/><g font-family="Arial, sans-serif"><text x="600" y="50" text-anchor="middle" fill="#f3f7ff" font-size="30" font-weight="700">Ciclo de vida de sockets TCP: servidor e cliente</text><text x="280" y="92" text-anchor="middle" fill="#00ffd1" font-size="19" font-weight="700">Servidor</text><text x="920" y="92" text-anchor="middle" fill="#b5ff9a" font-size="19" font-weight="700">Cliente</text><rect x="100" y="115" width="360" height="52" rx="16" fill="#0b2038" stroke="#38a8ff" stroke-width="3"/><text x="280.0" y="149" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">socket()</text><text x="280.0" y="177" text-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="280.0" dy="0">cria descritor</tspan></text><rect x="100" y="181" width="360" height="52" rx="16" fill="#0b2038" stroke="#38a8ff" stroke-width="3"/><text x="280.0" y="215" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">bind()</text><text x="280.0" y="243" text-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="280.0" dy="0">associa IP e porta</tspan></text><rect x="100" y="247" width="360" height="52" rx="16" fill="#0b2038" stroke="#38a8ff" stroke-width="3"/><text x="280.0" y="281" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">listen()</text><text x="280.0" y="309" text-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="280.0" dy="0">abre fila de conexões</tspan></text><rect x="100" y="313" width="360" height="52" rx="16" fill="#0b2038" stroke="#38a8ff" stroke-width="3"/><text x="280.0" y="347" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">accept()</text><text x="280.0" y="375" text-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="280.0" dy="0">cria socket conectado</tspan></text><rect x="100" y="379" width="360" height="52" rx="16" fill="#0b2038" stroke="#38a8ff" stroke-width="3"/><text x="280.0" y="413" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">recv()/send()</text><text x="280.0" y="441" text-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="280.0" dy="0">troca bytes</tspan></text><rect x="100" y="445" width="360" height="52" rx="16" fill="#0b2038" stroke="#38a8ff" stroke-width="3"/><text x="280.0" y="479" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">close()</text><text x="280.0" y="507" text-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="280.0" dy="0">encerra descritor</tspan></text><rect x="760" y="115" width="360" height="52" rx="16" fill="#152b25" stroke="#8cdc75" stroke-width="3"/><text x="940.0" y="149" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">socket()</text><text x="940.0" y="177" text-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="940.0" dy="0">cria descritor</tspan></text><rect x="760" y="220" width="360" height="52" rx="16" fill="#152b25" stroke="#8cdc75" stroke-width="3"/><text x="940.0" y="254" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">connect()</text><text x="940.0" y="282" text-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="940.0" dy="0">inicia handshake TCP</tspan></text><rect x="760" y="325" width="360" height="52" rx="16" fill="#152b25" stroke="#8cdc75" stroke-width="3"/><text x="940.0" y="359" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">send()/recv()</text><text x="940.0" y="387" text-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="940.0" dy="0">troca bytes</tspan></text><rect x="760" y="430" width="360" height="52" rx="16" fill="#152b25" stroke="#8cdc75" stroke-width="3"/><text x="940.0" y="464" text-anchor="middle" fill="#f3f7ff" font-size="20" font-weight="700">close()</text><text x="940.0" y="492" text-anchor="middle" fill="#a9bdd2" font-size="15" font-weight="400"><tspan x="940.0" dy="0">inicia ou conclui encerramento</tspan></text><line x1="280" y1="167" x2="280" y2="181" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><line x1="280" y1="233" x2="280" y2="247" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><line x1="280" y1="299" x2="280" y2="313" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><line x1="280" y1="365" x2="280" y2="379" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><line x1="280" y1="431" x2="280" y2="445" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><line x1="940" y1="167" x2="940" y2="206" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><line x1="940" y1="272" x2="940" y2="311" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><line x1="940" y1="377" x2="940" y2="416" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><line x1="760" y1="200" x2="460" y2="200" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="610.0" y="190.0" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">SYN</text><line x1="760" y1="245" x2="460" y2="245" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="610.0" y="235.0" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">SYN + ACK</text><line x1="760" y1="290" x2="460" y2="290" stroke="#5de7ff" stroke-width="3" marker-end="url(#arrow)"/><text x="610.0" y="280.0" text-anchor="middle" fill="#dcecff" font-size="16" font-weight="400">ACK</text><text x="600" y="555" text-anchor="middle" fill="#91a6bd" font-size="14" font-weight="400">accept() não devolve o socket de escuta. Ele cria um novo socket para aquela conexão.</text></g></svg>