<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img"><rect width="1200" height="520" rx="30" fill="url(#bg)"/><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#061326"/><stop offset="1" stop-color="#120b2d"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#39d9ff"/></marker></defs><g font-family="Inter,Segoe UI,Arial,sans-serif"><text x="600" y="58" text-anchor="middle" fill="#f4f7ff" font-size="32" font-weight="700">SAML federation: trust across domains</text><rect x="65" y="178" width="235" height="112" rx="18" fill="#0a1b34" stroke="#39d9ff" stroke-width="2"/><text x="182.5" y="216" text-anchor="middle" fill="#39d9ff" font-size="21" font-weight="700">User</text><text x="182.5" y="248" text-anchor="middle" fill="#dbe8fb" font-size="15">accesses the application</text><path d="M300 234 L333 234" stroke="#39d9ff" stroke-width="3" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="343" y="178" width="235" height="112" rx="18" fill="#0a1b34" stroke="#c682ff" stroke-width="2"/><text x="460.5" y="216" text-anchor="middle" fill="#c682ff" font-size="21" font-weight="700">Service Provider</text><text x="460.5" y="248" text-anchor="middle" fill="#dbe8fb" font-size="15">requests authentication</text><path d="M578 234 L611 234" stroke="#39d9ff" stroke-width="3" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="621" y="178" width="235" height="112" rx="18" fill="#0a1b34" stroke="#39d9ff" stroke-width="2"/><text x="738.5" y="216" text-anchor="middle" fill="#39d9ff" font-size="21" font-weight="700">Identity Provider</text><text x="738.5" y="248" text-anchor="middle" fill="#dbe8fb" font-size="15">authenticates and issues assertion</text><path d="M856 234 L889 234" stroke="#39d9ff" stroke-width="3" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/><rect x="899" y="178" width="235" height="112" rx="18" fill="#0a1b34" stroke="#c682ff" stroke-width="2"/><text x="1016.5" y="216" text-anchor="middle" fill="#c682ff" font-size="21" font-weight="700">Local session</text><text x="1016.5" y="248" text-anchor="middle" fill="#dbe8fb" font-size="15">application grants access</text><rect x="110" y="444" width="980" height="52" rx="14" fill="#091a32" stroke="#36537d"/><text x="600" y="476" text-anchor="middle" fill="#c8d7ee" font-size="17">Signed XML messages and trusted metadata connect the domains.</text></g></svg>