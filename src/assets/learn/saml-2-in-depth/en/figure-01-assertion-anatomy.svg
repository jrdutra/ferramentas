<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img"><rect width="1200" height="520" rx="30" fill="url(#bg)"/><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#061326"/><stop offset="1" stop-color="#120b2d"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#39d9ff"/></marker></defs><g font-family="Inter,Segoe UI,Arial,sans-serif"><text x="600" y="58" text-anchor="middle" fill="#f4f7ff" font-size="32" font-weight="700">Conceptual anatomy of a SAML Assertion</text><rect x="36" y="175" width="200" height="125" rx="18" fill="#0a1b34" stroke="#39d9ff" stroke-width="2"/><text x="136" y="213" text-anchor="middle" fill="#39d9ff" font-size="21" font-weight="700">Issuer</text><text x="136" y="245" text-anchor="middle" fill="#dbe8fb" font-size="15">who issued it</text><rect x="268" y="175" width="200" height="125" rx="18" fill="#0a1b34" stroke="#ffcf6a" stroke-width="2"/><text x="368" y="213" text-anchor="middle" fill="#ffcf6a" font-size="21" font-weight="700">Subject</text><text x="368" y="245" text-anchor="middle" fill="#dbe8fb" font-size="15">who the principal is</text><rect x="500" y="175" width="200" height="125" rx="18" fill="#0a1b34" stroke="#c682ff" stroke-width="2"/><text x="600" y="213" text-anchor="middle" fill="#c682ff" font-size="21" font-weight="700">Conditions</text><text x="600" y="245" text-anchor="middle" fill="#dbe8fb" font-size="15">time and audience</text><rect x="732" y="175" width="200" height="125" rx="18" fill="#0a1b34" stroke="#78e2ae" stroke-width="2"/><text x="832" y="213" text-anchor="middle" fill="#78e2ae" font-size="21" font-weight="700">Statements</text><text x="832" y="245" text-anchor="middle" fill="#dbe8fb" font-size="15">authn, attributes, decision</text><rect x="964" y="175" width="200" height="125" rx="18" fill="#0a1b34" stroke="#ff9c75" stroke-width="2"/><text x="1064" y="213" text-anchor="middle" fill="#ff9c75" font-size="21" font-weight="700">Signature</text><text x="1064" y="245" text-anchor="middle" fill="#dbe8fb" font-size="15">integrity and origin</text><rect x="110" y="444" width="980" height="52" rx="14" fill="#091a32" stroke="#36537d"/><text x="600" y="476" text-anchor="middle" fill="#c8d7ee" font-size="17">The assertion must not be accepted merely because the signature is valid.</text></g></svg>