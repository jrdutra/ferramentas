<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" role="img" aria-labelledby="title desc">
  <title id="title">Jornada ponta a ponta de uma requisição HTTPS</title>
  <desc id="desc">Fluxo da aplicação cliente por DNS, rede, TLS, borda, API Gateway, identidade, backend e dependências.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#07142b"/><stop offset="1" stop-color="#030b1b"/></linearGradient><linearGradient id="flow"><stop stop-color="#00ffd1"/><stop offset=".5" stop-color="#38a8ff"/><stop offset="1" stop-color="#b625ff"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1400" height="500" rx="28" fill="url(#bg)"/>
  <text x="700" y="55" text-anchor="middle" fill="#f3f7ff" font-family="Arial, sans-serif" font-size="30" font-weight="700">De la URI a la respuesta</text>
  <path d="M110 250H1290" stroke="url(#flow)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(120 250)"><circle r="46" fill="#0b2038" stroke="#00ffd1" stroke-width="4"/><text y="8" fill="#f3f7ff" font-size="19" font-weight="700">CLIENTE</text><text y="85" fill="#00ffd1" font-size="18" font-weight="700">1. URI</text><text y="110" fill="#91a6bd" font-size="15">método y headers</text></g>
    <g transform="translate(290 250)"><circle r="46" fill="#0b2038" stroke="#18e3e6" stroke-width="4"/><text y="8" fill="#f3f7ff" font-size="19" font-weight="700">DNS</text><text y="85" fill="#18e3e6" font-size="18" font-weight="700">2. Nombre</text><text y="110" fill="#91a6bd" font-size="15">host a IP</text></g>
    <g transform="translate(460 250)"><circle r="46" fill="#0b2038" stroke="#38a8ff" stroke-width="4"/><text y="8" fill="#f3f7ff" font-size="19" font-weight="700">RED</text><text y="85" fill="#38a8ff" font-size="18" font-weight="700">3-4. Ruta</text><text y="110" fill="#91a6bd" font-size="15">TCP o QUIC</text></g>
    <g transform="translate(630 250)"><circle r="46" fill="#0b2038" stroke="#5c8dff" stroke-width="4"/><text y="8" fill="#f3f7ff" font-size="19" font-weight="700">TLS</text><text y="85" fill="#7297ff" font-size="18" font-weight="700">5. Confianza</text><text y="110" fill="#91a6bd" font-size="15">certificado y claves</text></g>
    <g transform="translate(800 250)"><circle r="46" fill="#0b2038" stroke="#8275ff" stroke-width="4"/><text y="8" fill="#f3f7ff" font-size="19" font-weight="700">BORDE</text><text y="85" fill="#9d8cff" font-size="18" font-weight="700">6. Protección</text><text y="110" fill="#91a6bd" font-size="15">WAF y límites</text></g>
    <g transform="translate(970 250)"><circle r="54" fill="#151b3d" stroke="#a858ff" stroke-width="5" filter="url(#glow)"/><text y="-4" fill="#f3f7ff" font-size="18" font-weight="700">API</text><text y="19" fill="#f3f7ff" font-size="18" font-weight="700">GATEWAY</text><text y="91" fill="#c36aff" font-size="18" font-weight="700">7-9. Políticas</text><text y="116" fill="#91a6bd" font-size="15">identidad y ruta</text></g>
    <g transform="translate(1150 250)"><circle r="46" fill="#191834" stroke="#b625ff" stroke-width="4"/><text y="8" fill="#f3f7ff" font-size="18" font-weight="700">BACKEND</text><text y="85" fill="#d56aff" font-size="18" font-weight="700">10. Dominio</text><text y="110" fill="#91a6bd" font-size="15">regla de negocio</text></g>
    <g transform="translate(1300 250)"><circle r="40" fill="#191834" stroke="#e45cff" stroke-width="4"/><text y="7" fill="#f3f7ff" font-size="16" font-weight="700">DATOS</text><text y="78" fill="#e878ff" font-size="17" font-weight="700">11-12</text><text y="102" fill="#91a6bd" font-size="14">respuesta y trazas</text></g>
  </g>
</svg>
