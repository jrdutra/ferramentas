<section class="home-dashboard">
    <div class="home-intro-container">
        <div class="home-intro-glow" aria-hidden="true"></div>
        <div class="home-intro">
            <h1>utily.tools</h1>
            <p>Pick a tool by category.</p>
        </div>
    </div>

    <!-- Tool filter -->
    <mat-form-field appearance="fill" class="home-filtro-field">
        <input matInput [(ngModel)]="filtro" placeholder="Filter tools…" autocomplete="off" spellcheck="false" />
        <button matSuffix mat-icon-button *ngIf="filtro" (click)="limparFiltro()" aria-label="Clear filter">
            <mat-icon>close</mat-icon>
        </button>
    </mat-form-field>

    <!-- No results -->
    <div class="home-sem-resultados" *ngIf="semResultados">
        <mat-icon>search_off</mat-icon>
        <span>No tools found for <strong>"{{ filtro }}"</strong></span>
    </div>

    <section class="grupo-ferramentas" *ngFor="let grupo of gruposFiltrados; trackBy: trackByGrupo">
        <div class="grupo-cabecalho">
            <h2>{{ grupo.titulo }}</h2>
        </div>

        <div class="grade-ferramentas">
            <button class="atalho-ferramenta" type="button" *ngFor="let ferramenta of grupo.ferramentas; trackBy: trackByFerramenta"
                (click)="navegaFerramenta(ferramenta.rota)">
                <span class="imagem-ferramenta">
                    <img
                        [src]="ferramenta.image"
                        [alt]="ferramenta.imageAlt"
                        [attr.width]="ferramenta.imageWidth"
                        [attr.height]="ferramenta.imageHeight"
                        loading="lazy"
                        decoding="async"
                    />
                    <span class="icone-ferramenta" aria-hidden="true">
                        <mat-icon>{{ ferramenta.icone }}</mat-icon>
                    </span>
                </span>
                <span class="conteudo-ferramenta">
                    <strong>{{ ferramenta.titulo }}</strong>
                    <span class="descricao-ferramenta">{{ ferramenta.descricao }}</span>
                    <span class="acao-ferramenta">
                        {{ ferramenta.external ? 'Open external tool' : 'Open tool' }}
                        <mat-icon>{{ ferramenta.external ? 'open_in_new' : 'arrow_forward' }}</mat-icon>
                    </span>
                </span>
            </button>
        </div>
    </section>
</section>
