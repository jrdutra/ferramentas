<section class="home-dashboard">
    <div class="home-intro">
        <h1>Ferramentas</h1>
        <p>Escolha uma ferramenta por categoria.</p>
    </div>

    <section class="grupo-ferramentas" *ngFor="let grupo of gruposFerramentas">
        <div class="grupo-cabecalho">
            <h2>{{ grupo.titulo }}</h2>
        </div>

        <div class="grade-ferramentas">
            <button class="atalho-ferramenta" type="button" *ngFor="let ferramenta of grupo.ferramentas"
                (click)="navegaFerramenta(ferramenta.rota)">
                <span class="icone-ferramenta">
                    <mat-icon>{{ ferramenta.icone }}</mat-icon>
                </span>
                <span class="conteudo-ferramenta">
                    <strong>{{ ferramenta.titulo }}</strong>
                </span>
                <span class="descricao-ferramenta">{{ ferramenta.descricao }}</span>
            </button>
        </div>
    </section>
</section>
