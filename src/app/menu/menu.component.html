<div class="div-principal">
    <div class="div-topo menu-fixo">
        <mat-toolbar color="primary" class="mat-elevation-z4">
            <div class="menu-grande">
                <button mat-button (click)="navegaMenu('home')">
                    <mat-icon>home</mat-icon>
                    Home
                </button>
                <button mat-button (click)="navegaMenu('about')">
                    <mat-icon>info</mat-icon>
                    About
                </button>
                <button mat-button (click)="navegaMenu('articles')">
                    <mat-icon>article</mat-icon>
                    Articles
                </button>
                <button mat-button (click)="navegaMenu('learn')">
                    <mat-icon>school</mat-icon>
                    Learn
                </button>
            </div>

            <div class="marca-direita">
                <img src="/assets/icon-preto.png" class="logo-direita logo-cor-invertida" alt="utily.tools">
                <span class="nome-marca">utily.tools</span>
            </div>

            <div class="menu-hamburger">
                <button [matMenuTriggerFor]="menuHamburger" mat-icon-button class="example-icon">
                    <mat-icon>menu</mat-icon>
                </button>
                <mat-menu #menuHamburger="matMenu">
                    <button mat-menu-item (click)="navegaMenu('home')">Home</button>
                    <button mat-menu-item (click)="navegaMenu('about')">About</button>
                    <button mat-menu-item (click)="navegaMenu('articles')">Articles</button>
                    <button mat-menu-item (click)="navegaMenu('learn')">Learn</button>
                </mat-menu>
            </div>
            <span class="menu-hamburger">Tools</span>
            <span class="example-spacer menu-hamburger"></span>
            <button mat-icon-button class="example-icon home-icon menu-hamburger"
                aria-label="Go to home page" (click)="navegaMenu('home')">
                <mat-icon>home</mat-icon>
            </button>
        </mat-toolbar>
    </div>
    <div class="div-rodape">
        <span class="titulo-aplicacao">{{ tituloAplicacao$ | async }}</span>
    </div>
</div>
