<div class="container">

  <div class="upload-area" (click)="fileInput.click()">
    <mat-icon class="upload-icone">add_photo_alternate</mat-icon>
    <p class="upload-texto">Clique para adicionar imagens</p>
    <p class="upload-hint">JPG, PNG, GIF, WebP, BMP — cada imagem será uma página do PDF</p>
    <input hidden multiple #fileInput type="file" accept="image/*" (change)="carregarImagens($event)">
  </div>

  <div class="acoes-topo" *ngIf="imagens.length > 0">
    <button mat-raised-button color="primary" (click)="fileInput2.click()">
      <mat-icon>add_photo_alternate</mat-icon> Adicionar mais
    </button>
    <input hidden multiple #fileInput2 type="file" accept="image/*" (change)="carregarImagens($event)">
    <button mat-button (click)="limpar()">
      <mat-icon>clear_all</mat-icon> Limpar tudo
    </button>
  </div>

  <div class="lista-cabecalho" *ngIf="imagens.length > 0">
    <span class="lista-info">{{ imagens.length }} imagem(ns) — arraste para reordenar as páginas</span>
  </div>

  <div cdkDropList class="grade-imagens" (cdkDropListDropped)="reordenar($event)" *ngIf="imagens.length > 0">
    <div class="item-imagem" cdkDrag *ngFor="let imagem of imagens; let i = index">
      <div class="imagem-preview-wrapper">
        <img class="imagem-preview" [src]="imagem.preview" [alt]="imagem.nome">
        <span class="posicao-badge">{{ i + 1 }}</span>
        <button class="btn-remover-imagem" mat-mini-fab (click)="remover(i)" title="Remover">
          <mat-icon>close</mat-icon>
        </button>
        <div class="drag-overlay">
          <mat-icon>drag_indicator</mat-icon>
        </div>
      </div>
      <span class="imagem-nome" [title]="imagem.nome">{{ imagem.nome }}</span>
      <div class="drag-placeholder" *cdkDragPlaceholder></div>
    </div>
  </div>

  <div class="acoes-baixo" *ngIf="imagens.length > 0">
    <button mat-raised-button color="primary" (click)="criarPdf()" [disabled]="processando">
      <mat-spinner *ngIf="processando" diameter="18" class="spinner-btn"></mat-spinner>
      <mat-icon *ngIf="!processando">picture_as_pdf</mat-icon>
      {{ processando ? 'Gerando PDF…' : 'Criar PDF' }}
    </button>
  </div>

  <div class="mensagem" *ngIf="mensagem" [class.mensagem-erro]="erro">
    <mat-icon>{{ erro ? 'error_outline' : 'check_circle_outline' }}</mat-icon>
    {{ mensagem }}
  </div>

</div>
