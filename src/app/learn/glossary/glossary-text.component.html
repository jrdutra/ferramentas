@for (segment of segments; track $index) {
  @if (segment.entry) {
    <span class="glossary-term-shell">
      <button
        class="glossary-term"
        type="button"
        data-glossary-trigger
        [attr.aria-expanded]="popover.activeId() === occurrenceId($index)"
        [attr.aria-describedby]="popover.activeId() === occurrenceId($index) ? occurrenceId($index) + '-definition' : null"
        (click)="popover.toggle(occurrenceId($index))"
      >{{ segment.text }}</button>
      @if (popover.activeId() === occurrenceId($index)) {
        <span
          class="glossary-popover"
          role="tooltip"
          [id]="occurrenceId($index) + '-definition'"
        >
          <strong>{{ segment.entry.term }}</strong>
          <span>{{ segment.entry.definition }}</span>
          <span class="glossary-popover-hint">Esc</span>
        </span>
      }
    </span>
  } @else {
    {{ segment.text }}
  }
}
